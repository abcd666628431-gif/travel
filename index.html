        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin) };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {

            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            Image: (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />,
            ArrowLeft: (p) => <Icon {...p} path={<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>} />,
            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Lock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></>} />,
            Unlock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></>} />,
            GripVertical: (p) => <Icon {...p} path={<><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>} />,
            Camera: (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />
        };

        const TravelSegmentUI = ({ p1, p2, onMouseEnter, onMouseLeave }) => {
            const [mode, setMode] = useState('drive'); 
            const travelInfo = calculateTravelInfo(p1, p2);
            if (!travelInfo) return <div className="h-8 px-3 rounded-full border border-slate-700 bg-slate-800/50 flex items-center gap-1 text-[10px] text-slate-500"><span>🚗</span><span>計算中</span></div>;
            return (
                <div 
                    className="flex items-center gap-3 py-1 animate-fade-in group cursor-pointer"
                    onMouseEnter={onMouseEnter}
                    onMouseLeave={onMouseLeave}
                >
                    <div className="flex bg-slate-800 border border-slate-700 rounded-md p-0.5 shadow-md group-hover:border-amber-500 transition-colors">
                        <button onClick={() => setMode('drive')} className={`p-1 rounded transition-all flex items-center justify-center ${mode === 'drive' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`}><Icons.Bus size={12} /></button>
                        <button onClick={() => setMode('walk')} className={`p-1 rounded transition-all flex items-center justify-center ${mode === 'walk' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`}><Icons.Walking size={12} /></button>

                    <div className="text-xs font-bold text-slate-400 group-hover:text-amber-400 transition-colors">
                        約 {mode === 'walk' ? travelInfo.walk : travelInfo.drive}
                    </div>
                </div>
            );
        };

        const WeatherIcon = ({ type, size = 16 }) => {
            switch(type) {
                case 'sun': return <Icons.Sun size={size} className="text-orange-500" />;
                case 'cloud': return <Icons.Cloud size={size} className="text-gray-500" />;
                case 'rain': return <Icons.CloudRain size={size} className="text-blue-500" />;
                default: return <Icons.Sun size={size} className="text-orange-500" />;
            }
        };

        const CategoryIcon = ({ type }) => {
            const baseClass = "w-10 h-10 rounded-full flex items-center justify-center text-white";
            switch(type) {
                case 'food': return <div className={`${baseClass} bg-orange-400`}><Icons.Utensils size={20} /></div>;
                case 'shopping': return <div className={`${baseClass} bg-pink-400`}><Icons.ShoppingBag size={20} /></div>;
                case 'transport': return <div className={`${baseClass} bg-blue-400`}><Icons.Bus size={20} /></div>;
                case 'sight': return <div className={`${baseClass} bg-green-500`}><Icons.MapPin size={20} /></div>;
                case 'accommodation': return <div className={`${baseClass} bg-purple-500`}><Icons.Hotel size={20} /></div>;
                default: return <div className={`${baseClass} bg-gray-400`}><Icons.FileText size={20} /></div>;
            }
        };

        const getCategoryName = (type) => {
            const map = { food: '餐飲', shopping: '購物', transport: '交通', sight: '景點', accommodation: '住宿' };
            return map[type] || '其他';
        };

        const OnlineUserBadge = () => {
            const [onlineUsers, setOnlineUsers] = useState(1);
            useEffect(() => {
                setOnlineUsers(Math.floor(Math.random() * 5) + 1);
                const interval = setInterval(() => {
                     setOnlineUsers(prev => Math.max(1, prev + (Math.floor(Math.random() * 3) - 1)));
                }, 5000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex items-center gap-1.5 bg-green-50/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20 shrink-0">
                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span>{onlineUsers} 人在線</span>
                </div>
            );
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([35.6909, 139.7005], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => [p.lat, p.lng]));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            // 1. 路線渲染核心邏輯
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6'; // 整條路線皆固定顯示為藍色

                const validPlaces = places.filter(p => p.lat && p.lng);

                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.name}`)) + markerColor + routeColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) { map.removeLayer(markersRef.current[id].marker); }
                    delete markersRef.current[id];
                });
                
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    delete routeLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const marker = L.marker([place.lat, place.lng], { icon: customIcon }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };

                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i];
                                const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                
                                const segmentKey = `${p1.id}-${p2.id}-${p1.lat},${p1.lng}-${p2.lat},${p2.lng}`;
                                
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;

                                if (!geoData) {
                                    const url = `https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson`;
                                    try {
                                        const res = await fetch(url);
                                        if (res.ok) {
                                            const data = await res.json();
                                            if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                                                geoData = data.routes[0].geometry;
                                            } else {
                                                geoData = 'straight_line'; 
                                            }
                                        } else {
                                            geoData = 'straight_line';
                                        }
                                    } catch (e) {
                                        geoData = 'straight_line';
                                    }
                                    if (!window.routeCache) window.routeCache = {};
                                    window.routeCache[segmentKey] = geoData;
                                }

                                if (!isMounted || !mapInstanceRef.current) return;

                                let outline, main;
                                
                                if (geoData === 'straight_line') {
                                    const latlngs = [[p1.lat, p1.lng], [p2.lat, p2.lng]];
                                    outline = L.polyline(latlngs, outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline(latlngs, mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    outline = L.geoJSON(geoData, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(geoData, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                
                                if (main.bringToBack) main.bringToBack();
                                if (outline.bringToBack) outline.bringToBack();

                                routeLayersRef.current[segmentKey] = { outline, main, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                                await new Promise(resolve => setTimeout(resolve, 30));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            // 2. 標記的 Hover 邏輯
            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const { marker, index, baseColor } = data;
                    if (!marker) return;
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${baseColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    marker.setIcon(customIcon);
                    if (isHovered && !data.isHovered) { 
                        marker.openPopup(); 
                    } else if (!isHovered && data.isHovered) { 
                        marker.closePopup(); 
                    }
                    data.isHovered = isHovered;
                });
            }, [hoveredId]);

            // 3. 路線段落的 Hover 邏輯
            useEffect(() => {
                Object.values(routeLayersRef.current).forEach(data => {
                    const { main, p1Id, p2Id, baseColor } = data;
                    if (!main) return;
                    const isHovered = hoveredSegmentId === `${p1Id}-${p2Id}`;
                    if (isHovered) {
                        main.setStyle({ color: '#f59e0b', weight: 10 });
                        if (main.bringToFront) main.bringToFront();
                    } else {
                        main.setStyle({ color: baseColor, weight: 8 });
                    }
                });
            }, [hoveredSegmentId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

        // ==========================================
        // Dashboard Component (Trip List)
        // ==========================================
        function Dashboard({ trips, onCreateTrip, onSelectTrip, onDeleteTrip }) {
            return (
                <div className="flex justify-center h-full bg-[#0f172a] overflow-y-auto w-full">
                    <div className="max-w-[960px] w-full px-4 md:px-0">
                        <div className="my-10">
                            <h1 className="text-3xl font-bold mb-4 text-slate-100">我的行程</h1>
                        </div>
                        <div className="my-8 flex justify-end">
                            <button onClick={onCreateTrip} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-900/30 transition-all cursor-pointer">
                                <Icons.Plus size={20} /> 建立新行程
                            </button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                            {trips.length === 0 ? (
                                <div className="col-span-full text-center py-20 text-slate-500">
                                    <p>目前還沒有行程，開始建立你的第一個旅程吧！</p>
                                </div>
                            ) : (
                                trips.map((tripData, index) => {
                                    const mockImgNum = (index % 20) + 30; 
                                    return (
                                        <div key={tripData.id} onClick={() => onSelectTrip(tripData.id)} className="relative bg-slate-800 rounded-2xl overflow-hidden shadow-xl border border-slate-700 hover:border-blue-500 hover:shadow-blue-900/20 transition-all cursor-pointer group flex flex-col h-[280px]">
                                            <div className="h-40 overflow-hidden relative">
                                                <img src={`https://assets.funliday.com/trip-default-cover/${mockImgNum}.png`} alt="cover" loading="lazy" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => { e.target.onerror = null; e.target.src = 'https://assets.funliday.com/trip-default-cover/33.png'; }} />
                                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div>
                                            </div>
                                            <div className="p-5 flex-1 flex flex-col justify-end bg-slate-800 relative z-10 -mt-4 rounded-t-xl">
                                                <h3 className="font-bold text-lg text-slate-100 truncate">{tripData.trip?.title || '未命名行程'}</h3>
                                                <p className="text-sm text-slate-400 mt-1">{tripData.trip?.dates || '未設定日期'}</p>
                                            </div>
                                            
                                            <div className="absolute top-3 right-3 flex items-start gap-2">
                                                <div className="flex -space-x-2">
                                                    {(tripData.members || []).slice(0, 3).map((m, i) => (
                                                        <div key={i} className={`w-8 h-8 rounded-full border-2 border-slate-800 flex items-center justify-center text-xs text-white shadow-md ${m.color || 'bg-slate-600'}`} title={m.name}>
                                                            {m.avatar || '👤'}
                                                        </div>
                                                    ))}
                                                    {(tripData.members || []).length > 3 && (
                                                        <div className="w-8 h-8 rounded-full border-2 border-slate-800 flex items-center justify-center text-xs text-white bg-slate-700 shadow-md">
                                                            +{(tripData.members || []).length - 3}
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); onDeleteTrip(tripData.id); }} className="w-8 h-8 bg-slate-900/60 hover:bg-red-500/80 backdrop-blur-sm rounded-full flex items-center justify-center text-white transition-colors" title="刪除行程">
                                                    <Icons.Trash2 size={14} />
                                                </button>
                                            </div>
                                        </div>

                    </div>

        // ==========================================
        // Trip Planner Component
        // ==========================================
        function TripPlanner({ tripId, onBack, db, appId, user }) {
            const [trip, setTrip] = useState(INITIAL_TRIP);
            const [members, setMembers] = useState(INITIAL_MEMBERS);
            const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
            const [shoppingItems, setShoppingItems] = useState(INITIAL_SHOPPING_ITEMS);
            const [packingList, setPackingList] = useState(INITIAL_PACKING_LIST);
            
            const [activeTab, setActiveTab] = useState('itinerary');

            const [hoveredPlaceId, setHoveredPlaceId] = useState(null);
            const [hoveredSegmentId, setHoveredSegmentId] = useState(null);

            // Modals

            const [packingFilter, setPackingFilter] = useState('all');
            const [searchQuery, setSearchQuery] = useState("");
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [mapZoom, setMapZoom] = useState(1);
            const [previewImage, setPreviewImage] = useState(null);
            const [toast, setToast] = useState(null);
            const [draggedPlaceIndex, setDraggedPlaceIndex] = useState(null);
            const [editingPlaceId, setEditingPlaceId] = useState(null);
            const [editPlaceForm, setEditPlaceForm] = useState({});
            const [displayCurrency, setDisplayCurrency] = useState('HKD');
            const [isEditing, setIsEditing] = useState(false);
            const daysContainerRef = useRef(null); 

            // --- 滑鼠按住拖曳 (Drag to Scroll) 邏輯 ---
            const isDraggingDay = useRef(false);
            const dragStartX = useRef(0);
            const dragScrollLeft = useRef(0);
            const dragHasMoved = useRef(false); 

            const onDayMouseDown = (e) => {
                isDraggingDay.current = true;
                dragHasMoved.current = false; 
                dragStartX.current = e.pageX - daysContainerRef.current.offsetLeft;
                dragScrollLeft.current = daysContainerRef.current.scrollLeft;
            };

            const onDayMouseLeave = () => {
                isDraggingDay.current = false;
            };

            const onDayMouseUp = () => {
                isDraggingDay.current = false;
            };

            const onDayMouseMove = (e) => {
                if (!isDraggingDay.current) return;
                e.preventDefault();
                dragHasMoved.current = true; 
                const x = e.pageX - daysContainerRef.current.offsetLeft;
                const walk = (x - dragStartX.current) * 1.5; 
                daysContainerRef.current.scrollLeft = dragScrollLeft.current - walk;
            };

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                const unsubscribe = window.FirebaseSDK.onSnapshot(tripDocRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        if (data.trip) { setTrip(data.trip); if(!activeDayId && data.trip.days.length > 0) setActiveDayId(data.trip.days[0].id); }
                        if (data.members) setMembers(data.members);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.shoppingItems) setShoppingItems(data.shoppingItems);
                        if (data.packingList) setPackingList(data.packingList);
                    }
                }, (error) => console.error("Firestore sync error", error));
                return () => unsubscribe();
            }, [user, tripId]);

            const pushUpdate = (newData) => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                window.FirebaseSDK.updateDoc(tripDocRef, newData).catch(e => console.error("Update failed", e));
            };

            const activeDayData = useMemo(() => trip.days.find(d => d.id === activeDayId) || trip.days[0], [trip, activeDayId]);
            const getMemberInfo = useCallback((name) => members.find(m => m.name === name) || { color: 'bg-gray-400', avatar: '👤' }, [members]);
            const showToastMessage = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const [jpyToHkdRate] = useState(0.0496); 
            const [jpyToTwdRate] = useState(0.215);
            const [jpyToMopRate] = useState(0.0511);
            const EXCHANGE_RATE_JPY_TO_HKD = jpyToHkdRate;
            const HKD_TO_JPY_RATE = 1 / jpyToHkdRate;
            const TWD_TO_JPY_RATE = 1 / jpyToTwdRate; 

            const currentExchangeRate = useMemo(() => {
                switch(displayCurrency) {
                    case 'HKD': return jpyToHkdRate;
                    case 'TWD': return jpyToTwdRate;
                    case 'MOP': return jpyToMopRate;
                    case 'JPY': return 1;
                    default: return jpyToHkdRate;
                }
            }, [displayCurrency, jpyToHkdRate, jpyToTwdRate, jpyToMopRate]);
            
            const getRateToJPY = (currency) => {
                switch(currency) {
                    case 'HKD': return 1 / jpyToHkdRate;
                    case 'TWD': return 1 / jpyToTwdRate;
                    case 'MOP': return 1 / jpyToMopRate;
                    case 'JPY': return 1;
                    default: return 1 / jpyToHkdRate;
                }
            };

            const handleAddDay = () => {
                const newId = trip.days.length > 0 ? Math.max(...trip.days.map(d => d.id)) + 1 : 1;
                const colors = ['#f9115d', '#25c9dc', '#3fbd22', '#af54ff', '#ff9800'];
                const newDay = { id: newId, date: getFutureDate(newId - 1), title: '新的一天', color: colors[(newId-1)%colors.length], weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }, places: [] };
                pushUpdate({ trip: { ...trip, days: [...trip.days, newDay] } });
                setActiveDayId(newId);
            };

            const confirmDeleteDay = () => {
                const newDays = trip.days.filter(d => d.id !== activeDayId);
                pushUpdate({ trip: { ...trip, days: newDays } });
                if (newDays.length > 0) setActiveDayId(newDays[0].id);
                setShowDeleteDayConfirm(false);
            };

            const [newItem, setNewItem] = useState({ name: '', time: '12:00', type: 'sight', note: '' });
            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const newPlace = { id: 'p' + Date.now(), ...newItem, lat: 35.6895 + (Math.random()-0.5)*0.1, lng: 139.6917 + (Math.random()-0.5)*0.1 };
                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: [...d.places, newPlace] } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setShowAddModal(false);
                setNewItem({ name: '', time: '12:00', type: 'sight', note: '' });
            };

            const confirmDeletePlace = () => {
                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: d.places.filter(p => p.id !== placeToDelete) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPlaceToDelete(null);
            };

            const [newPacking, setNewPacking] = useState("");
            const handleAddPacking = (e) => {
                e.preventDefault();
                if (!newPacking) return;
                const updated = [...packingList, { id: 'pk'+Date.now(), text: newPacking, checked: false, owner: members[0]?.name || '' }];
                pushUpdate({ packingList: updated });
                setNewPacking("");
                setShowPackingModal(false);
            };

            const togglePacking = (id) => {
                const updated = packingList.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
                pushUpdate({ packingList: updated });
            };

            const deletePacking = (e, id) => {
                e.stopPropagation();
                pushUpdate({ packingList: packingList.filter(i => i.id !== id) });
            };

            const updateTripTitle = (e) => pushUpdate({ trip: { ...trip, title: e.target.value } });
            const updateTripDates = (e) => pushUpdate({ trip: { ...trip, dates: e.target.value } });

            const formatShortDate = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split(' ')[0].split('/');
                if (parts.length === 3) return `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
                return dateStr;
            };

            const filteredExpenses = useMemo(() => {
                let result = expenseFilter === 'all' ? [...expenses] : expenses.map(day => ({...day, items: day.items.filter(item => item.payer === expenseFilter || (item.sharedBy && item.sharedBy.includes(expenseFilter)))})).filter(day => day.items.length > 0);
                result.sort((a, b) => new Date(b.date) - new Date(a.date));
                return result;
            }, [expenses, expenseFilter]);

            const filteredTotalStats = useMemo(() => {
                let totalJPY = 0; filteredExpenses.forEach(d => d.items.forEach(i => totalJPY += i.amountJPY));
                return { jpy: totalJPY, display: Math.round(totalJPY * currentExchangeRate) };
            }, [filteredExpenses, currentExchangeRate]);

            const shoppingTotalStats = useMemo(() => {
                let totalJPY = 0;
                shoppingItems.forEach(item => {
                    // 修正 Bug: item.price 在存入時已經是 JPY，直接乘上數量即可
                    totalJPY += item.price * item.qty;
                });
                return { jpy: Math.round(totalJPY), display: Math.round(totalJPY * currentExchangeRate) };
            }, [shoppingItems, currentExchangeRate]); 

            const [newExpenseItem, setNewExpenseItem] = useState({ date: '2026-04-03', title: '', category: 'food', payer: members[0]?.name || '', amount: '', currency: 'JPY', sharedBy: members.map(m=>m.name), image: null });
            const handleAddExpenseSubmit = (e) => {
                e.preventDefault();
                let finalAmountJPY = Number(newExpenseItem.amount) * getRateToJPY(newExpenseItem.currency);
                const newExpense = { id: 'e_' + Date.now(), ...newExpenseItem, amountJPY: Math.round(finalAmountJPY) };
                delete newExpense.amount; delete newExpense.currency;
                const newExpenses = [...expenses]; const dayIndex = newExpenses.findIndex(d => d.date === newExpenseItem.date);
                if (dayIndex >= 0) newExpenses[dayIndex].items.push(newExpense);
                else newExpenses.push({ date: newExpenseItem.date, items: [newExpense] });
                newExpenses.sort((a, b) => new Date(a.date) - new Date(b.date)); 
                pushUpdate({ expenses: newExpenses }); 
                setShowExpenseModal(false); 
                setNewExpenseItem({ date: '2026-04-03', title: '', category: 'food', payer: members[0]?.name, amount: '', currency: 'JPY', sharedBy: members.map(m => m.name), image: null });
            };

            const confirmDeleteExpense = () => {
                if (expenseToDelete) {
                    const updated = expenses.map(day => ({...day, items: day.items.filter(item => item.id !== expenseToDelete.id)})).filter(day => day.items.length > 0);
                    pushUpdate({ expenses: updated });
                    setExpenseToDelete(null);
                }
            };

            const [newShoppingItem, setNewShoppingItem] = useState({ name: '', qty: 1, price: 0, currency: 'MOP', requester: members[0]?.name || '', note: '', image: null });
            const handleAddShoppingSubmit = (e) => {
                e.preventDefault();
                let jpyPrice = Number(newShoppingItem.price) * getRateToJPY(newShoppingItem.currency);
                pushUpdate({ shoppingItems: [...shoppingItems, { id: 's_' + Date.now(), ...newShoppingItem, qty: Number(newShoppingItem.qty), price: Math.round(jpyPrice), currency: newShoppingItem.currency, requester: members[0]?.name, note: '', image: null }] }); 
                setShowShoppingModal(false); setNewShoppingItem({ name: '', qty: 1, price: 0, currency: 'MOP', requester: members[0]?.name, note: '', image: null });
            };

            const confirmDeleteShopping = () => {
                if (shoppingToDelete) {
                    pushUpdate({ shoppingItems: shoppingItems.filter(item => item.id !== shoppingToDelete) });
                    setShoppingToDelete(null);
                }
            };

            // --- 新增：圖片壓縮與上傳邏輯 ---
            const handlePlaceImageUpload = (dayId, placeId, e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // 建立 Canvas 進行智慧壓縮，防止 Base64 檔案過大超過 Firebase 限制
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        // 更新 Firebase
                        const newDays = trip.days.map(d => {
                            if (d.id === dayId) {
                                return { ...d, places: d.places.map(p => p.id === placeId ? { ...p, image: dataUrl } : p) };
                            }
                            return d;
                        });
                        pushUpdate({ trip: { ...trip, days: newDays } });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const removePlaceImage = (dayId, placeId) => {
                const newDays = trip.days.map(d => {
                    if (d.id === dayId) {
                        return { ...d, places: d.places.map(p => p.id === placeId ? { ...p, image: null } : p) };
                    }
                    return d;
                });
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            // --- 新增：拖動排序 (Drag & Drop) 邏輯 ---
            const handleDragStart = (e, index) => {
                if (!isEditing) return;
                setDraggedPlaceIndex(index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                if (draggedPlaceIndex === null || draggedPlaceIndex === dropIndex) return;

                const newPlaces = [...activeDayData.places];
                const draggedItem = newPlaces[draggedPlaceIndex];
                newPlaces.splice(draggedPlaceIndex, 1);
                newPlaces.splice(dropIndex, 0, draggedItem);

                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: newPlaces } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setDraggedPlaceIndex(null);
            };

            const handleDragEnd = () => {
                setDraggedPlaceIndex(null);
            };

            const handleImageUpload = useCallback((e, setter) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setter(prev => ({ ...prev, image: reader.result })); };
                    reader.readAsDataURL(file);
                }
            }, []);
            const removeImage = useCallback((setter) => { setter(prev => ({ ...prev, image: null })); }, []);

            const settlementResult = useMemo(() => {
                const balances = {}; members.forEach(m => balances[m.name] = 0);
                expenses.forEach(day => day.items.forEach(item => {
                    const splitBy = item.sharedBy || []; if (splitBy.length === 0) return;
                    const splitAmount = item.amountJPY / splitBy.length;
                    if (balances[item.payer] !== undefined) balances[item.payer] += item.amountJPY;
                    splitBy.forEach(person => { if (balances[person] !== undefined) balances[person] -= splitAmount; });
                }));
                const debtors = []; const creditors = [];
                Object.entries(balances).forEach(([name, amount]) => { if (amount < -1) debtors.push({ name, amount }); if (amount > 1) creditors.push({ name, amount }); });
                debtors.sort((a, b) => a.amount - b.amount); creditors.sort((a, b) => b.amount - a.amount);
                const transactions = []; let i = 0; let j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i]; const creditor = creditors[j];
                    const amount = Math.min(Math.abs(debtor.amount), creditor.amount);
                    transactions.push({ from: debtor.name, to: creditor.name, amount: amount });
                    debtor.amount += amount; creditor.amount -= amount;
                    if (Math.abs(debtor.amount) < 1) i++; if (creditor.amount < 1) j++;
                }
                return { balances, transactions };
            }, [expenses, members]);

            const handleAddMember = () => {
                const colors = ['bg-yellow-500', 'bg-blue-400', 'bg-green-500', 'bg-red-400', 'bg-purple-500', 'bg-pink-400'];
                pushUpdate({ members: [...members, { id: 'm' + Date.now(), name: `成員${members.length + 1}`, color: colors[members.length % colors.length], avatar: '👤' }] });
            };

            const updateMember = (id, field, value) => {
                const oldMember = members.find(m => m.id === id); if (!oldMember) return;
                const oldName = oldMember.name;
                const updatedMembers = members.map(m => m.id === id ? { ...m, [field]: value } : m);
                let updates = { members: updatedMembers };
                if (field === 'name' && value !== oldName) {
                    updates.expenses = expenses.map(d => ({ ...d, items: d.items.map(i => ({ ...i, payer: i.payer === oldName ? value : i.payer, sharedBy: i.sharedBy.map(n => n === oldName ? value : n) })) }));
                    updates.shoppingItems = shoppingItems.map(i => ({...i, requester: i.requester === oldName ? value : i.requester}));
                    updates.packingList = packingList.map(i => ({...i, owner: i.owner === oldName ? value : i.owner}));
                }
                pushUpdate(updates);
            };

            const handleDeleteMember = (id) => {
                if (members.length <= 1) { showToastMessage("至少需要保留一位成員！"); return; }
                if (confirm("確定要刪除此成員嗎？")) pushUpdate({ members: members.filter(m => m.id !== id) });
            };

            const toggleSharedMember = (m) => setNewExpenseItem(prev => { const shared = prev.sharedBy.includes(m) ? (prev.sharedBy.length > 1 ? prev.sharedBy.filter(name => name !== m) : prev.sharedBy) : [...prev.sharedBy, m]; return { ...prev, sharedBy: shared }; });

            // 建立可共用的切換編輯按鈕，綠色底色
            const EditToggleButton = () => (
                <button onClick={() => setIsEditing(!isEditing)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-all shadow-md ${isEditing ? 'bg-green-500 hover:bg-green-400 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-600'}`}>
                    {isEditing ? <><Icons.Unlock size={14} /> 編輯模式</> : <><Icons.Lock size={14} /> 唯讀模式</>}
                </button>
            );

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    {toast && (<div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 border border-slate-700"><span>{toast}</span></div></div>)}

                    {previewImage && (<div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 animate-fade-in" onClick={() => setPreviewImage(null)}><button className="absolute top-4 right-4 p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-colors shadow-lg"><Icons.X size={24} /></button><img src={previewImage} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl border border-slate-700" alt="Preview" /></div>)}

                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3 flex-1">
                            <button onClick={onBack} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 transition-colors mr-1">
                                <Icons.ArrowLeft size={20} />

                                <input type="text" value={trip.dates} readOnly={!isEditing} onChange={updateTripDates} className={`text-xs text-slate-500 bg-transparent outline-none border rounded px-1 -ml-1 transition-colors w-full ${isEditing ? 'border-transparent hover:border-slate-700 focus:border-blue-500 cursor-text' : 'border-transparent pointer-events-none'}`}/>

                        <button onClick={() => setActiveTab('itinerary')} className={`py-3 flex items-center gap-2 border-b-2 transition-colors shrink-0 ${activeTab === 'itinerary' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500 hover:text-slate-300'}`}><Icons.Map size={18} />行程</button>
                        <button onClick={() => setActiveTab('expenses')} className={`py-3 flex items-center gap-2 border-b-2 transition-colors shrink-0 ${activeTab === 'expenses' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500 hover:text-slate-300'}`}><Icons.Wallet size={18} />花費</button>
                        <button onClick={() => setActiveTab('shopping')} className={`py-3 flex items-center gap-2 border-b-2 transition-colors shrink-0 ${activeTab === 'shopping' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500 hover:text-slate-300'}`}><Icons.ShoppingBag size={18} />待買</button>

                                        className="bg-slate-900 border-b border-slate-800 px-3 py-4 flex flex-nowrap gap-3 overflow-x-auto no-scrollbar shadow-sm shrink-0 w-full cursor-grab active:cursor-grabbing select-none"

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await window.FirebaseSDK.signInAnonymously(auth);
                    } catch (e) { console.error("Firebase Auth Error", e); }
                };
                initAuth();
                const unsubscribe = window.FirebaseSDK.onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips');
                
                const unsubscribe = window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => {
                    const fetchedTrips = [];
                    snapshot.forEach(doc => {
                        fetchedTrips.push({ id: doc.id, ...doc.data() });
                    });
                    
                    fetchedTrips.sort((a, b) => b.id.localeCompare(a.id));
                    setTrips(fetchedTrips);
                    
                    if (fetchedTrips.length === 0) {
                        const newTripId = 'trip_' + Date.now();
                        const tripRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId);
                        window.FirebaseSDK.setDoc(tripRef, INITIAL_TRIP_DATA);
                    }
                }, (error) => console.error("Firestore sync error", error));
                
                return () => unsubscribe();
            }, [user, db, appId]);

            const createNewTrip = async () => {
                if (!user) return;
                const newTripId = 'trip_' + Date.now();
                const tripRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId);
                
                const newTripData = {
                    trip: {
                        id: newTripId,
                        title: '未命名新行程',
                        dates: `${getFutureDate(0)} - ${getFutureDate(3)}`,
                        icon: '✈️',
                        author: '我',
                        days: [
                            { id: 1, date: getFutureDate(0), title: '第一天', weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }, places: [] }
                        ]
                    },
                    members: [ { id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' } ],
                    expenses: [],
                    shoppingItems: [],
                    packingList: []
                };

                await window.FirebaseSDK.setDoc(tripRef, newTripData);
                setActiveTripId(newTripId);
                setCurrentView('planner');
            };

            const deleteTrip = async (tripId) => {
                if (!user) return;
                if (confirm("確定要刪除這個行程嗎？此動作無法復原。")) {
                    const tripRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                    await window.FirebaseSDK.deleteDoc(tripRef).catch(e => console.error("Delete failed", e));
                    if (activeTripId === tripId) {
                        setCurrentView('dashboard');
                        setActiveTripId(null);
                    }
                }
            };

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;

            if (currentView === 'dashboard') {
                return (
                    <Dashboard 
                        trips={trips} 
                        onCreateTrip={createNewTrip} 
                        onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} 
                        onDeleteTrip={deleteTrip}
                    />
                );
            }

            return (
                <TripPlanner 
                    tripId={activeTripId} 
                    onBack={() => { setCurrentView('dashboard'); setActiveTripId(null); }} 
                    db={db} 
                    appId={appId} 
                    user={user} 
                />
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
