        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // --- 座標轉換：高德(GCJ-02) 轉 WGS-84 (國際標準) ---
        const gcj02towgs84 = (lng, lat) => {
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;

            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };

            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };

            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [lng * 2 - mglng, lat * 2 - mglat];
        };

                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };

            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;

            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [mglng, mglat];

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                
                // ===== 替換為高德地圖圖磚 =====
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '&copy; 高德地圖'
                }).addTo(map);
                // ============================

                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                
                if (tempMarkerRef.current) {
                    map.removeLayer(tempMarkerRef.current);
                    tempMarkerRef.current = null;
                }
                
                if (tempMarker) {
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce" style="z-index: 2000;">📍</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    const [gLng, gLat] = wgs84togcj02(tempMarker.lng, tempMarker.lat);
                    const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                    marker.openPopup();
                    map.setView([gLat, gLng], 15, { animate: true });
                    tempMarkerRef.current = marker;
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => {
                         const [gLng, gLat] = wgs84togcj02(p.lng, p.lat);
                         return [gLat, gLng];
                     }));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';

                const validPlaces = places.filter(p => p.lat && p.lng);

                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor + routeColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) { map.removeLayer(markersRef.current[id].marker); }
                    delete markersRef.current[id];
                });
                
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    if (layers.alts) {
                        layers.alts.forEach(altLayer => {
                            if (map.hasLayer(altLayer)) map.removeLayer(altLayer);
                        });
                    }
                    delete routeLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const [gLng, gLat] = wgs84togcj02(place.lng, place.lat);
                        const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };

                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i];
                                const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                
                                const travelMode = p1.travelMode || 'drive';
                                const segmentKey = `${p1.id}-${p2.id}-${p1.lat},${p1.lng}-${p2.lat},${p2.lng}-${travelMode}`;
                                
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;

                                if (!geoData) {
                                    if (travelMode === 'straight') {
                                        geoData = ['straight_line']; 
                                        if (!window.routeCache) window.routeCache = {};
                                        window.routeCache[segmentKey] = geoData;
                                    } else {
                                        const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                        const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson&alternatives=true`;
                                        try {
                                            const res = await fetch(url);
                                            if (res.ok) {
                                                const data = await res.json();
                                                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                                                    geoData = data.routes.map(r => r.geometry);
                                                } else {
                                                    geoData = ['straight_line']; 
                                                }
                                            } else {
                                                geoData = ['straight_line'];
                                            }
                                        } catch (e) {
                                            geoData = ['straight_line'];
                                        }
                                        if (!window.routeCache) window.routeCache = {};
                                        window.routeCache[segmentKey] = geoData;
                                    }
                                }

                                if (!isMounted || !mapInstanceRef.current) return;

                                let outline, main;
                                let alts = [];
                                
                                const geometries = Array.isArray(geoData) ? geoData : [geoData];
                                const selectedIndex = p1.routeIndex || 0;
                                const validIndex = selectedIndex < geometries.length ? selectedIndex : 0;

                                if (geometries.length > 1) {
                                    geometries.forEach((geo, idx) => {
                                        if (idx === validIndex || geo === 'straight_line') return;
                                        
                                        const altStyle = { color: '#94a3b8', weight: 6, opacity: 0.8, lineCap: 'round', lineJoin: 'round', dashArray: '5, 10' };
                                        const clickStyle = { color: 'transparent', weight: 20, opacity: 0 }; 
                                        
                                        const geoGCJ = JSON.parse(JSON.stringify(geo));
                                        if(geoGCJ.coordinates) {
                                            geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                        }
                                        
                                        const altMain = L.geoJSON(geoGCJ, { style: altStyle }).addTo(mapInstanceRef.current);
                                        const altClick = L.geoJSON(geoGCJ, { style: clickStyle }).addTo(mapInstanceRef.current);
                                        
                                        altClick.on('click', () => {
                                            if (onRouteAltSelect) onRouteAltSelect(p1.id, idx);
                                        });
                                        
                                        altClick.on('mouseover', () => {
                                            altMain.setStyle({ color: '#cbd5e1', weight: 8, cursor: 'pointer' });
                                            if (altMain.bringToFront) altMain.bringToFront();
                                        });
                                        altClick.on('mouseout', () => altMain.setStyle(altStyle));
                                        
                                        alts.push(altMain, altClick);
                                    });
                                }

                                const mainGeo = geometries[validIndex];
                                if (mainGeo === 'straight_line') {
                                    const [gLng1, gLat1] = wgs84togcj02(p1.lng, p1.lat);
                                    const [gLng2, gLat2] = wgs84togcj02(p2.lng, p2.lat);
                                    const latlngs = [[gLat1, gLng1], [gLat2, gLng2]];
                                    outline = L.polyline(latlngs, outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline(latlngs, mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    const geoGCJ = JSON.parse(JSON.stringify(mainGeo));
                                    if(geoGCJ.coordinates) {
                                        geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                    }
                                    outline = L.geoJSON(geoGCJ, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(geoGCJ, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                
                                if (main.bringToFront) main.bringToFront();

                                routeLayersRef.current[segmentKey] = { outline, main, alts, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                                await new Promise(resolve => setTimeout(resolve, 30));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const { marker, index, baseColor } = data;
                    if (!marker) return;
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${baseColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    marker.setIcon(customIcon);
                    if (isHovered && !data.isHovered) { 
                        marker.openPopup(); 
                    } else if (!isHovered && data.isHovered) { 
                        marker.closePopup(); 
                    }
                    data.isHovered = isHovered;
                });
            }, [hoveredId]);

            useEffect(() => {
                Object.values(routeLayersRef.current).forEach(data => {
                    const { main, p1Id, p2Id, baseColor } = data;
                    if (!main) return;
                    const isHovered = hoveredSegmentId === `${p1Id}-${p2Id}`;
                    if (isHovered) {
                        main.setStyle({ color: '#f59e0b', weight: 10 });
                        if (main.bringToFront) main.bringToFront();
                    } else {
                        main.setStyle({ color: baseColor, weight: 8 });
                    }
                });
            }, [hoveredSegmentId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

                            };
                            reader.readAsDataURL(imageFile);

                                    ...(tempMarker ? { lat: tempMarker.lat, lng: tempMarker.lng } : {})

                setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            };

            const handleUpdateTravelMode = (dayId, placeId, newMode) => {
                const newDays = trip.days.map(d => d.id === dayId ? { ...d, places: d.places.map(p => p.id === placeId ? { ...p, travelMode: newMode, routeIndex: 0 } : p) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            const handleUpdateRouteIndex = (dayId, placeId, index) => {
                const newDays = trip.days.map(d => d.id === dayId ? { ...d, places: d.places.map(p => p.id === placeId ? { ...p, routeIndex: index } : p) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            const confirmDeletePlace = () => {
                const newDays = trip.days.map(d => String(d.id) === String(activeDayId) ? { ...d, places: d.places.filter(p => p.id !== placeToDelete) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPlaceToDelete(null);
                setPanelMode('list');
            };

            const toggleNote = (placeId, e) => {
                e.stopPropagation();
                setExpandedNotes(prev => ({ ...prev, [placeId]: !prev[placeId] }));
            };

            const handleDragStart = (e, idx, pId) => { 
                if (dragEnabledId !== pId) { 
                    e.preventDefault(); 
                    return; 
                }
                setDraggedPlaceIndex(idx); 
                e.dataTransfer.effectAllowed = 'move';
                if (e.dataTransfer.setData) e.dataTransfer.setData('text/plain', ''); 
            };
            const handleDrop = (e, dropIdx) => {
                e.preventDefault(); 
                if (draggedPlaceIndex === null || draggedPlaceIndex === dropIdx) return;
                const newPs = [...activeDayData.places]; 
                const item = newPs.splice(draggedPlaceIndex, 1)[0];
                newPs.splice(dropIdx, 0, item);
                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: newPs } : d);
                pushUpdate({ trip: { ...trip, days: newDays } }); 
                setDraggedPlaceIndex(null);
                setDragEnabledId(null);
            };
            const handleDragEnd = () => { 
                setDraggedPlaceIndex(null); 
                setDragEnabledId(null);
            };

            const [jpyToHkdRate] = React.useState(0.0496); 
            const [jpyToTwdRate] = React.useState(0.215);
            const [jpyToMopRate] = React.useState(0.0511);

            const currentExchangeRate = useMemo(() => {
                switch(displayCurrency) { case 'HKD': return jpyToHkdRate; case 'TWD': return jpyToTwdRate; case 'MOP': return jpyToMopRate; default: return 1; }
            }, [displayCurrency, jpyToHkdRate, jpyToTwdRate, jpyToMopRate]);
            
            const getRateToJPY = (currency) => {
                switch(currency) { case 'HKD': return 1 / jpyToHkdRate; case 'TWD': return 1 / jpyToTwdRate; case 'MOP': return 1 / jpyToMopRate; default: return 1; }
            };

            const filteredExpenses = useMemo(() => {
                if (!expenses) return [];
                let result = expenseFilter === 'all' ? [...expenses] : expenses.map(day => ({...day, items: day.items.filter(item => item.payer === expenseFilter || (item.sharedBy && item.sharedBy.includes(expenseFilter)))})).filter(day => day.items.length > 0);
                return result.sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [expenses, expenseFilter]);

            const filteredTotalStats = useMemo(() => {
                let totalJPY = 0; filteredExpenses.forEach(d => d.items.forEach(i => totalJPY += i.amountJPY));
                return { jpy: totalJPY, display: Math.round(totalJPY * currentExchangeRate) };
            }, [filteredExpenses, currentExchangeRate]);

            const shoppingTotalStats = useMemo(() => {
                let totalJPY = 0; shoppingItems.forEach(item => { totalJPY += item.price * item.qty; });
                return { jpy: Math.round(totalJPY), display: Math.round(totalJPY * currentExchangeRate) };
            }, [shoppingItems, currentExchangeRate]); 

            const handleAddExpenseSubmit = (e) => {
                e.preventDefault();
                let finalAmountJPY = Number(newExpenseItem.amount) * getRateToJPY(newExpenseItem.currency);
                const newExpense = { id: 'e_' + Date.now(), payer: newExpenseItem.payer, title: newExpenseItem.title, category: newExpenseItem.category, sharedBy: newExpenseItem.sharedBy, amountJPY: Math.round(finalAmountJPY), image: newExpenseItem.image };
                const newExpenses = [...expenses]; const dayIndex = newExpenses.findIndex(d => d.date === newExpenseItem.date);
                if (dayIndex >= 0) newExpenses[dayIndex].items.push(newExpense); else newExpenses.push({ date: newExpenseItem.date, items: [newExpense] });
                pushUpdate({ expenses: newExpenses.sort((a, b) => new Date(a.date) - new Date(b.date)) }); 
                setShowExpenseModal(false); 
                setNewExpenseItem({ date: '2026-04-03', title: '', category: 'food', payer: members[0]?.name, amount: '', currency: 'JPY', sharedBy: members.map(m => m.name), image: null });
            };

            const confirmDeleteExpense = () => {
                if (expenseToDelete) { pushUpdate({ expenses: expenses.map(day => ({...day, items: day.items.filter(item => item.id !== expenseToDelete.id)})).filter(day => day.items.length > 0) }); setExpenseToDelete(null); }
            };

            const handleAddShoppingSubmit = (e) => {
                e.preventDefault();
                let jpyPrice = Number(newShoppingItem.price) * getRateToJPY(newShoppingItem.currency);
                pushUpdate({ shoppingItems: [...shoppingItems, { id: 's_' + Date.now(), ...newShoppingItem, qty: Number(newShoppingItem.qty), price: Math.round(jpyPrice), currency: newShoppingItem.currency, requester: members[0]?.name, note: '', image: null }] }); 
                setShowShoppingModal(false); setNewShoppingItem({ name: '', qty: 1, price: 0, currency: 'MOP', requester: members[0]?.name, note: '', image: null });
            };

            const confirmDeleteShopping = () => {
                if (shoppingToDelete) { pushUpdate({ shoppingItems: shoppingItems.filter(item => item.id !== shoppingToDelete) }); setShoppingToDelete(null); }

            const filteredPackingList = useMemo(() => {
                if (!packingList) return [];
                if (packingFilter === 'all') return packingList;
                return packingList.filter(item => item.owner === packingFilter || item.owner === 'all');
            }, [packingList, packingFilter]);

            const handleAddPacking = (e) => {
                e.preventDefault(); if (!newPackingItem.text) return;

                setNewPackingItem({ text: '', owner: '' }); setShowPackingModal(false);
            };

            const togglePacking = (id) => pushUpdate({ packingList: packingList.map(i => i.id === id ? { ...i, checked: !i.checked } : i) });
            const deletePacking = (e, id) => { e.stopPropagation(); pushUpdate({ packingList: packingList.filter(i => i.id !== id) }); };

            const settlementResult = useMemo(() => {
                const balances = {}; members.forEach(m => balances[m.name] = 0);
                expenses.forEach(day => day.items.forEach(item => {
                    const splitBy = item.sharedBy || []; if (splitBy.length === 0) return;
                    const splitAmount = item.amountJPY / splitBy.length;
                    if (balances[item.payer] !== undefined) balances[item.payer] += item.amountJPY;
                    splitBy.forEach(person => { if (balances[person] !== undefined) balances[person] -= splitAmount; });
                }));
                const debtors = []; const creditors = [];
                Object.entries(balances).forEach(([name, amount]) => { if (amount < -1) debtors.push({ name, amount }); if (amount > 1) creditors.push({ name, amount }); });
                debtors.sort((a, b) => a.amount - b.amount); creditors.sort((a, b) => b.amount - a.amount);
                const transactions = []; let i = 0; let j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i]; const creditor = creditors[j];
                    const amount = Math.min(Math.abs(debtor.amount), creditor.amount);
                    transactions.push({ from: debtor.name, to: creditor.name, amount: amount });
                    debtor.amount += amount; creditor.amount -= amount;
                    if (Math.abs(debtor.amount) < 1) i++; if (creditor.amount < 1) j++;
                }
                return { balances, transactions };
            }, [expenses, members]);

            const toggleSharedMember = (m) => setNewExpenseItem(prev => { const shared = prev.sharedBy.includes(m) ? (prev.sharedBy.length > 1 ? prev.sharedBy.filter(name => name !== m) : prev.sharedBy) : [...prev.sharedBy, m]; return { ...prev, sharedBy: shared }; });

                setActiveDayId(newId);

                reader.onload = (event) => {
                    const img = new Image();

                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > 800) { h *= 800/w; w = 800; } } else { if (h > 800) { w *= 800/h; h = 800; } }
                        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        
                        const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        const targetPlace = trip.days.flatMap(d => d.places).find(p => p.id === placeId);
                        const targetName = targetPlace?.name;

                        pushUpdate({ 
                            trip: { 
                                ...trip, 
                                days: trip.days.map(d => ({
                                    ...d,
                                    places: d.places.map(p => {
                                        // 【同名同步】
                                        if (p.id === placeId || (targetName && p.name === targetName)) {
                                            return { ...p, image: imageDataUrl };
                                        }
                                        return p;
                                    })
                                })) 
                            } 
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

                    updates.packingList = packingList.map(i => ({...i, owner: i.owner === oldName ? value : i.owner}));
                }
                pushUpdate(updates);

                    {previewImage && <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 animate-fade-in" onClick={() => setPreviewImage(null)}><button className="absolute top-4 right-4 p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition-colors shadow-lg"><Icons.X size={24} /></button><img src={previewImage} className="max-w-full max-h-full object-contain" /></div>}

                            <div className={`w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold hover:scale-105 transition-transform`}>
                                <input value={trip.icon || '🚀'} onChange={e => pushUpdate({trip:{...trip, icon:e.target.value}})} className="w-full h-full bg-transparent text-center text-lg outline-none cursor-pointer" maxLength="2"/>
                            </div>
                            <div className="flex flex-col min-w-0 flex-1">
                                <input value={trip.title} onChange={(e) => pushUpdate({trip:{...trip, title:e.target.value}})} className="text-sm font-bold bg-transparent outline-none w-full" />
                                <input value={trip.dates} onChange={(e) => pushUpdate({trip:{...trip, dates:e.target.value}})} className="text-xs text-slate-500 bg-transparent outline-none w-full" />
                            </div>
                        </div>
                        <OnlineUserBadge />
                    </header>
                    <div className="flex border-b border-slate-800 bg-slate-900 px-4 gap-6 text-sm font-medium overflow-x-auto no-scrollbar">
                        <button onClick={() => setActiveTab('itinerary')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'itinerary' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Map size={18} />行程</button>
                        <button onClick={() => setActiveTab('expenses')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'expenses' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Wallet size={18} />花費</button>
                        <button onClick={() => setActiveTab('shopping')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'shopping' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.ShoppingBag size={18} />待買</button>
                        <button onClick={() => setActiveTab('packing')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'packing' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Briefcase size={18} />行李</button>

                    <div className="flex flex-1 overflow-hidden">
                        {activeTab === 'itinerary' && (

                                    {panelMode === 'list' ? (

                                                className="bg-slate-900 border-b border-slate-800 px-3 py-4 flex flex-nowrap gap-3 overflow-x-auto no-scrollbar shadow-sm cursor-grab active:cursor-grabbing select-none"
                                            >

                                                        <div className="flex justify-between w-full mb-1.5"><span className={`text-sm font-bold ${activeDayId === day.id ? 'text-blue-400' : 'text-slate-400'}`}>Day {idx + 1}</span><WeatherIcon type={day.weather?.type} size={16} /></div>
                                                        <span className="text-xs font-medium mb-1 text-slate-500">{formatShortDate(day.date)}</span>

                                                <button onClick={(e) => { if(dragHasMoved.current) return; handleAddDay(); }} className="min-w-[80px] p-3 rounded-xl border-2 border-dashed border-slate-700 text-slate-500 hover:text-slate-300 hover:border-slate-500 transition-colors flex flex-col items-center justify-center">

                                                                    {/* Card Content */}

                                                                            {/* 圖片預覽區域 (不再作為拖曳把手) */}

                                                                                    </div>
                                                                                    
                                                                                    {/* 卡片右側的動作按鈕列 */}
                                                                                    <div className="flex items-center gap-1 shrink-0 ml-2">
                                                                                        {/* 右側拖曳把手 2：明確的 Grip 圖示 */}
                                                                                        <div

                                                                                <div className={`mt-2 flex flex-wrap items-center gap-1.5 ${p.note ? 'ml-5' : ''}`}>

                    {/* Modals Data */}
                    {showExpenseModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden flex flex-col max-h-[90vh] border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50 shrink-0"><h3 className="font-bold text-lg text-slate-100">新增花費</h3><button onClick={() => setShowExpenseModal(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div><form onSubmit={handleAddExpenseSubmit} className="p-6 space-y-4 overflow-y-auto"><div><label className="block text-sm font-bold text-slate-400 mb-1">名稱</label><input required value={newExpenseItem.title} onChange={e => setNewExpenseItem({...newExpenseItem, title: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div><div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">日期</label><input required type="date" value={newExpenseItem.date} onChange={e => setNewExpenseItem({...newExpenseItem, date: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">類別</label><select value={newExpenseItem.category} onChange={e => setNewExpenseItem({...newExpenseItem, category: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="food">餐飲</option><option value="shopping">購物</option><option value="transport">交通</option><option value="sight">景點</option><option value="accommodation">住宿</option><option value="other">其他</option></select></div></div><div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">金額</label><input required type="number" value={newExpenseItem.amount} onChange={e => setNewExpenseItem({...newExpenseItem, amount: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="w-24"><label className="block text-sm font-bold text-slate-400 mb-1">幣別</label><select value={newExpenseItem.currency} onChange={e => setNewExpenseItem({...newExpenseItem, currency: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="JPY">JPY</option><option value="HKD">HKD</option><option value="TWD">TWD</option><option value="MOP">MOP</option></select></div></div><div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">付款人</label><select value={newExpenseItem.payer} onChange={e => setNewExpenseItem({...newExpenseItem, payer: e.target.value})} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg">{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div><div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">分攤成員</label><div className="flex flex-wrap gap-2">{members.map(m => { const isChecked = newExpenseItem.sharedBy.includes(m.name); return (<button key={m.id} type="button" onClick={() => toggleSharedMember(m.name)} className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all border flex items-center gap-1 ${isChecked ? 'bg-blue-900/40 text-blue-400 border-blue-500/50' : 'bg-slate-800 text-slate-500 border-slate-700'}`}>{isChecked ? '✓ ' : ''}{m.avatar} {m.name}</button>); })}</div></div><button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-2 shadow-lg">確認新增</button></form></div></div>
                    )}
                    {showShoppingModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">新增待買項目</h3><button onClick={() => setShowShoppingModal(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div><form onSubmit={handleAddShoppingSubmit} className="p-6 space-y-4"><div><label className="block text-sm font-bold text-slate-400 mb-1">品名</label><input required value={newShoppingItem.name} onChange={e => setNewShoppingItem({...newShoppingItem, name: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">數量</label><input type="number" min="1" value={newShoppingItem.qty} onChange={e => setNewShoppingItem({...newShoppingItem, qty: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">單價</label><input required type="number" min="0" value={newShoppingItem.price} onChange={e => setNewShoppingItem({...newShoppingItem, price: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div></div><div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">訂購人</label><select value={newShoppingItem.requester} onChange={e => setNewShoppingItem({...newShoppingItem, requester: e.target.value})} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg">{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div><button type="submit" className="w-full py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-bold mt-2 shadow-lg">確認新增</button></form></div></div>
                    )}
                    {showPackingModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">新增行李項目</h3><button onClick={() => setShowPackingModal(false)}><Icons.X size={20} className="text-slate-500 hover:text-white transition-colors" /></button></div><form onSubmit={handleAddPacking} className="p-6 space-y-4"><div><label className="block text-sm font-bold text-slate-400 mb-1">物品名稱</label><input required placeholder="例如: 護照" value={newPackingItem.text} onChange={e => setNewPackingItem({...newPackingItem, text: e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-slate-100"/></div><div><label className="block text-sm font-bold text-slate-400 mb-1">所屬成員</label><select value={newPackingItem.owner} onChange={e => setNewPackingItem({...newPackingItem, owner: e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"><option value="all">👥 全體成員</option>{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div><button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-2 shadow-lg transition-colors">新增</button></form></div></div>
                    )}
                    {showSettlementPlan && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100 flex items-center gap-2"><Icons.Calculator size={20} className="text-blue-400"/>結算方案</h3><button onClick={() => setShowSettlementPlan(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div><div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto"><div className="bg-blue-900/20 rounded-xl p-4 border border-blue-800/30"><h4 className="text-sm font-bold text-blue-400 mb-2">建議轉帳</h4><div className="space-y-2">{settlementResult.transactions.length > 0 ? settlementResult.transactions.map((t, idx) => (<div key={idx} className="bg-slate-900/50 p-3 rounded-lg border border-slate-700 flex items-center justify-between"><div className="text-sm text-slate-300">{t.from} ➔ {t.to}</div><div className="text-blue-400 font-bold">{displayCurrency} {formatNumber(t.amount * currentExchangeRate)}</div></div>)) : <div className="text-center text-slate-500 text-sm py-2">目前帳目已平衡</div>}</div></div></div></div></div>
                    )}
                    {showMemberSettings && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100 flex items-center gap-2"><Icons.Settings size={20} className="text-slate-400"/>成員資料</h3><button onClick={() => setShowMemberSettings(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div><div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">{members.map(m => (<div key={m.id} className="flex items-center gap-3 p-3 border border-slate-700 rounded-xl bg-slate-900/50"><input type="text" value={m.name} onChange={(e) => updateMember(m.id, 'name', e.target.value)} className="flex-1 px-3 py-1.5 rounded-lg text-slate-200 outline-none border border-slate-700 bg-slate-800 focus:ring-2 focus:ring-blue-500" /><button onClick={() => handleDeleteMember(m.id)} className="p-2 text-slate-600 hover:text-red-400 transition-colors"><Icons.Trash2 size={18} /></button></div>))}<button onClick={handleAddMember} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold flex items-center justify-center gap-2"><Icons.Plus size={16} /> 新增成員</button></div></div></div>
                    )}
                    {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); if(trip.days.length > 1) setActiveDayId(trip.days.find(d=>d.id!==activeDayId).id); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl">刪除</button></div></div></div>)}
                    {placeToDelete && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此景點？</h3><div className="flex gap-3 mt-6"><button onClick={() => setPlaceToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300">取消</button><button onClick={confirmDeletePlace} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl">刪除</button></div></div></div>)}
                    {expenseToDelete && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此筆消費嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setExpenseToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300">取消</button><button onClick={confirmDeleteExpense} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl">刪除</button></div></div></div>)}
                    {shoppingToDelete && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此待買項目嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShoppingToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300">取消</button><button onClick={confirmDeleteShopping} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl">刪除</button></div></div></div>)}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            useEffect(() => {
                const initAuth = async () => { try { await window.FirebaseSDK.signInAnonymously(auth); } catch (e) {} };
                initAuth();
                return window.FirebaseSDK.onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips');
                return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => {
                    const fetchedTrips = [];
                    snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); });
                    if (snapshot.empty) {
                        const newTripId = 'trip_sz-macau';
                        window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId), INITIAL_TRIP_DATA);
                    }
                    setTrips(fetchedTrips.sort((a, b) => b.id.localeCompare(a.id)));
                }, (error) => {
                    console.error("Firestore error:", error);
                });
            }, [user, db, appId]);

            const handleExportTrip = (tripData) => {
                const dataStr = JSON.stringify(tripData, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url; link.download = `${tripData.trip?.title || 'trip'}.json`;
                link.click(); URL.revokeObjectURL(url);
                showMsg("導出成功");
            };

            const handleImportTrip = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (!importedData.trip) return showMsg("格式錯誤");
                        const newTripId = 'trip_imp_' + Date.now();
                        importedData.id = newTripId;
                        if (importedData.trip) importedData.trip.id = newTripId;
                        await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId), importedData);
                        showMsg("匯入成功！");
                    } catch (err) { showMsg("無效檔案"); }
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;

            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={async () => {
                const nid = 'trip_' + Date.now();
                await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { 
                    trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '🚀', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: [], weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }}] }, 
                    members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], 
                    expenses: [], shoppingItems: [], packingList: [] 
                });
                setActiveTripId(nid); setCurrentView('planner');
            }} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={async (id) => { if (confirm("確定刪除行程？")) await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', id)); }} onImportTrip={handleImportTrip} onExportTrip={handleExportTrip} toast={toast} />;

            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
