        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin), dist };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {
            if (!timeStr) return '';
            let [h, m] = timeStr.split(':').map(Number);
            const addH = Math.floor(hoursToAdd);
            const addM = Math.round((hoursToAdd - addH) * 60);
            m += addM; h += addH + Math.floor(m / 60); m = m % 60; h = h % 24;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };

        const formatShortDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split(' ')[0].split('/');
            if (parts.length === 3) return `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
            return dateStr;

            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,

        const OnlineUserBadge = () => {

        const TravelSegmentUI = ({ p1, p2, onUpdateMode, onMouseEnter, onMouseLeave }) => {

                if (mode === 'straight') return `直線 ${travelInfo.dist.toFixed(1)} km`;

        function TripPlanner({ tripId, onBack, db, user }) {
            const [trip, setTrip] = useState({ title: '', dates: '', days: [] });
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [shoppingItems, setShoppingItems] = useState([]);
            const [packingList, setPackingList] = useState([]);
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [activeDayId, setActiveDayId] = useState(null);
            const [panelMode, setPanelMode] = useState('list'); 
            const [newItem, setNewItem] = useState({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            const [toast, setToast] = useState(null);
            const [expandedNotes, setExpandedNotes] = useState({});
            const [placeToDelete, setPlaceToDelete] = useState(null);
            const [showPackingModal, setShowPackingModal] = useState(false);
            const [newPackingItem, setNewPackingItem] = useState({ text: '', owner: 'all' });
            const [packingFilter, setPackingFilter] = useState('all');

            // 強制固定 appId 為一個共通值，確保所有人看到同樣數據
            const SHARED_APP_ID = "main-travel-planner-v2";

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', SHARED_APP_ID, 'public', 'data', 'trips', tripId);
                return window.FirebaseSDK.onSnapshot(tripDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setTrip(data.trip || {});
                        setMembers(data.members || []);
                        setExpenses(data.expenses || []);
                        setShoppingItems(data.shoppingItems || []);
                        setPackingList(data.packingList || []);
                        if (!activeDayId && data.trip?.days?.length > 0) setActiveDayId(data.trip.days[0].id);
                    }
                });
            }, [user, tripId]);

            const pushUpdate = (data) => window.FirebaseSDK.updateDoc(window.FirebaseSDK.doc(db, 'artifacts', SHARED_APP_ID, 'public', 'data', 'trips', tripId), data);
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const activeDayData = useMemo(() => trip.days?.find(d => d.id === activeDayId) || trip.days?.[0], [trip, activeDayId]);

            const toggleNote = (id, e) => { e.stopPropagation(); setExpandedNotes(prev => ({...prev, [id]: !prev[id]})); };

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full border border-slate-700 font-bold"><span>{toast}</span></div></div>}
                    
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 z-20">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="p-1.5 bg-slate-800 rounded-full"><Icons.ArrowLeft size={20} /></button>
                            <span className="font-bold">{trip.title} 🚀</span>
                        </div>
                        <OnlineUserBadge />
                    </header>

                    <div className="flex border-b border-slate-800 bg-slate-900 px-4 gap-6 text-sm">
                        <button onClick={() => setActiveTab('itinerary')} className={`py-3 border-b-2 ${activeTab === 'itinerary' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}>行程</button>
                        <button onClick={() => setActiveTab('packing')} className={`py-3 border-b-2 ${activeTab === 'packing' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}>行李</button>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {activeTab === 'itinerary' && (
                            <>
                                <div className="w-full md:w-[550px] flex flex-col border-r border-slate-800 bg-slate-900 transition-all overflow-hidden">
                                    {panelMode === 'list' ? (
                                        <div className="p-4 overflow-y-auto h-full">
                                            <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                                                {trip.days?.map((day, idx) => (
                                                    <button key={day.id} onClick={() => setActiveDayId(day.id)} className={`px-4 py-2 rounded-xl border shrink-0 ${activeDayId === day.id ? 'bg-blue-600 border-blue-500' : 'bg-slate-800 border-slate-700'}`}>Day {idx+1}</button>
                                                ))}
                                            </div>
                                            <div className="space-y-4">
                                                {activeDayData?.places.map((p, i) => (
                                                    <div key={p.id} className="bg-slate-800 border border-slate-700 rounded-xl p-4">
                                                        <div className="flex justify-between items-start">
                                                            <div onClick={(e) => toggleNote(p.id, e)} className="flex-1 cursor-pointer">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-blue-400 font-mono text-xs">{p.time}</span>
                                                                    <h3 className="font-bold">{p.name}</h3>
                                                                </div>
                                                                {expandedNotes[p.id] && <p className="mt-2 text-sm text-slate-400 whitespace-pre-wrap">{p.note}</p>}
                                                            </div>
                                                            <button onClick={() => {
                                                                setNewItem({ ...p });
                                                                setPanelMode('edit');
                                                            }} className="p-1.5 text-slate-500 hover:text-white"><Icons.MoreVertical size={18} /></button>
                                                        </div>
                                                        {i < activeDayData.places.length - 1 && (
                                                            <div className="mt-4 flex justify-center">
                                                                <TravelSegmentUI p1={p} p2={activeDayData.places[i+1]} onUpdateMode={(m) => {
                                                                    const newDays = trip.days.map(d => d.id === activeDayId ? {...d, places: d.places.map(pl => pl.id === p.id ? {...pl, travelMode: m} : pl)} : d);
                                                                    pushUpdate({trip: {...trip, days: newDays}});
                                                                }} />
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => { setNewItem({id: '', name:'', time:'12:00', type:'sight', note:'', stayTime:'1'}); setPanelMode('add'); }} className="w-full py-4 border-2 border-dashed border-slate-700 rounded-xl mt-6 text-slate-500 font-bold">+ 新增景點</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col h-full p-4">
                                            <div className="flex items-center mb-6">
                                                <button onClick={() => setPanelMode('list')} className="p-2"><Icons.ArrowLeft size={20}/></button>
                                                <h2 className="text-xl font-bold ml-2">{panelMode === 'add' ? '新增景點' : '編輯景點資料'}</h2>
                                            </div>
                                            <div className="space-y-4 flex-1 overflow-y-auto pr-2">
                                                <input placeholder="景點名稱" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 outline-none" />
                                                <div className="flex gap-4">
                                                    <input type="time" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} className="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 outline-none" />
                                                    <input type="number" step="0.5" placeholder="停留小時" value={newItem.stayTime} onChange={e => setNewItem({...newItem, stayTime: e.target.value})} className="flex-1 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 outline-none" />
                                                </div>
                                                <textarea placeholder="備註內容" value={newItem.note} onChange={e => setNewItem({...newItem, note: e.target.value})} rows="5" className="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 outline-none resize-none" />
                                                
                                                <button onClick={() => {
                                                    if (!newItem.name) return showMsg("請輸入名稱");
                                                    let newDays;
                                                    if (panelMode === 'add') {
                                                        const p = { ...newItem, id: 'p' + Date.now(), lat: 22.5, lng: 114.1 };
                                                        newDays = trip.days.map(d => d.id === activeDayId ? {...d, places: [...d.places, p]} : d);
                                                    } else {
                                                        newDays = trip.days.map(d => d.id === activeDayId ? {...d, places: d.places.map(pl => pl.id === newItem.id ? newItem : pl)} : d);
                                                    }
                                                    pushUpdate({trip: {...trip, days: newDays}});
                                                    setPanelMode('list');
                                                }} className="w-full py-4 bg-blue-600 rounded-xl font-bold">儲存景點</button>
                                                
                                                {panelMode === 'edit' && (
                                                    <button onClick={() => {
                                                        if (window.confirm("確定要刪除此景點嗎？")) {
                                                            const newDays = trip.days.map(d => d.id === activeDayId ? {...d, places: d.places.filter(pl => pl.id !== newItem.id)} : d);
                                                            pushUpdate({trip: {...trip, days: newDays}});
                                                            setPanelMode('list');
                                                            showMsg("🗑️ 已刪除");
                                                        }
                                                    }} className="w-full py-4 bg-slate-800 border border-red-500/50 text-red-400 rounded-xl font-bold flex items-center justify-center gap-2 mt-4">
                                                        <Icons.Trash2 size={18} /> 刪除景點
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 hidden md:block">
                                    <RealMap places={activeDayData?.places || []} zoomControlKey={activeDayId} />
                                </div>
                            </>
                        )}

                        {activeTab === 'packing' && (
                            <div className="w-full p-4 overflow-y-auto">
                                <div className="max-w-xl mx-auto space-y-6 pb-20">
                                    <select value={packingFilter} onChange={e => setPackingFilter(e.target.value)} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
                                        <option value="all">👥 全體清單</option>
                                        {members.map(m => <option key={m.id} value={m.name}>{m.avatar} {m.name}</option>)}
                                    </select>
                                    <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden divide-y divide-slate-700">
                                        {packingList.filter(i => packingFilter === 'all' || i.owner === packingFilter || i.owner === 'all').map(item => (
                                            <div key={item.id} className="p-4 flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <input type="checkbox" checked={item.checked} onChange={() => pushUpdate({packingList: packingList.map(i => i.id === item.id ? {...i, checked: !i.checked} : i)})} className="w-5 h-5 rounded" />
                                                    <span className={item.checked ? 'line-through text-slate-500' : ''}>{item.text}</span>
                                                    {item.owner === 'all' && <span className="text-[10px] bg-blue-900/50 text-blue-400 px-1.5 py-0.5 rounded">全體</span>}
                                                </div>
                                                <button onClick={() => pushUpdate({packingList: packingList.filter(i => i.id !== item.id)})} className="text-slate-600"><Icons.Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                        <button onClick={() => { setNewPackingItem({text: '', owner: packingFilter}); setShowPackingModal(true); }} className="w-full p-4 text-blue-400 font-bold">+ 新增行李項目</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {showPackingModal && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-800 p-6 rounded-2xl w-full max-w-xs border border-slate-700">
                                <h3 className="text-lg font-bold mb-4">新增行李</h3>
                                <input autoFocus placeholder="物品名稱" value={newPackingItem.text} onChange={e => setNewPackingItem({...newPackingItem, text: e.target.value})} className="w-full p-3 rounded-xl bg-slate-900 mb-4 outline-none border border-slate-700" />
                                <select value={newPackingItem.owner} onChange={e => setNewPackingItem({...newPackingItem, owner: e.target.value})} className="w-full p-3 rounded-xl bg-slate-900 mb-6 outline-none border border-slate-700">
                                    <option value="all">👥 全體成員</option>
                                    {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                                </select>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowPackingModal(false)} className="flex-1 py-3 text-slate-400">取消</button>
                                    <button onClick={() => {
                                        if(!newPackingItem.text) return;
                                        pushUpdate({packingList: [...packingList, {id: Date.now(), ...newPackingItem, checked: false}]});
                                        setShowPackingModal(false);
                                    }} className="flex-1 py-3 bg-blue-600 rounded-xl font-bold">新增</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const { db, auth } = getFirebaseContext();
            const SHARED_APP_ID = "main-travel-planner-v2";

            useEffect(() => {
                window.FirebaseSDK.signInAnonymously(auth).catch(() => {});
                return window.FirebaseSDK.onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', SHARED_APP_ID, 'public', 'data', 'trips');
                return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                    setTrips(fetched);
                });
            }, [user, db]);

            if (!user) return <div className="h-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">🚀 啟動中...</div>;

            if (currentView === 'dashboard') return <Dashboard trips={trips} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onCreateTrip={async () => {
                const nid = 'trip_' + Date.now();
                await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', SHARED_APP_ID, 'public', 'data', 'trips', nid), INITIAL_TRIP_DATA);
            }} />;

            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} user={user} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
