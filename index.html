        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => {
             return Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        };

        const formatJPYRate = (amount) => {
            return Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        };
        
        const formatJPY = (amount) => {
             return Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        };

        const deg2rad = (deg) => {
            return deg * (Math.PI / 180);
        };

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 

            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;

            return {
                walk: format(walkMin),
                drive: format(driveMin)
            };
        };

        const fetchWeatherFromAPI = async (lat, lng, dateOffset) => {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`);
                const data = await response.json();
                
                if (data.daily) {
                    const index = Math.min(dateOffset, 6); 
                    const code = data.daily.weather_code[index];
                    const min = Math.round(data.daily.temperature_2m_min[index]);
                    const max = Math.round(data.daily.temperature_2m_max[index]);
                    let type = 'sun';
                    let label = '晴天';
                    if (code > 3 && code < 50) { type = 'cloud'; label = '多雲'; }
                    else if (code >= 50) { type = 'rain'; label = '有雨'; }
                    return { type, minTemp: min, maxTemp: max, label };
                }
            } catch (error) {
                console.error("Weather fetch error:", error);
                return null;
            }
            return null;

        const getCategoryName = (type) => {

        };

        const RealMap = React.memo(({ places, subwayPath, hoveredId, zoomControlKey }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({});
            const routeLayersRef = useRef([]);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current).setView([35.6909, 139.7005], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
                mapInstanceRef.current = map;
                
                setTimeout(() => {
                    if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize();
                }, 200);

                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                const validPlaces = places.filter(p => p.lat && p.lng);
                
                if (subwayPath && subwayPath.length > 0) {
                     const bounds = L.latLngBounds();
                     subwayPath.forEach(node => {
                         const coords = STATION_COORDS[node.station];
                         if (coords) bounds.extend([coords.lat, coords.lng]);
                     });
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
                } else if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => [p.lat, p.lng]));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
                }
            }, [zoomControlKey, places, subwayPath]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                
                Object.values(markersRef.current).forEach(layer => map.removeLayer(layer));
                markersRef.current = {};
                routeLayersRef.current.forEach(layer => {
                    if (map.hasLayer(layer)) map.removeLayer(layer);
                });
                routeLayersRef.current = [];

                if (subwayPath && subwayPath.length > 0) {
                    const latlngs = [];
                    subwayPath.forEach((node, index) => {
                        const coords = STATION_COORDS[node.station];
                        if (!coords) return;
                        const latlng = [coords.lat, coords.lng];
                        latlngs.push(latlng);
                        let colorClass = 'bg-blue-500';
                        if (index === 0) colorClass = 'bg-green-500';
                        else if (index === subwayPath.length - 1) colorClass = 'bg-red-500';
                        else if (node.line) colorClass = 'bg-yellow-500'; 
                        const iconHtml = `<div class="flex items-center justify-center w-6 h-6 rounded-full border-2 border-white shadow-lg ${colorClass} text-white font-bold text-xs">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -12] });
                        L.marker(latlng, { icon: customIcon }).bindPopup(`<b>${node.station}</b>${node.line ? `<br>轉乘: ${node.line}` : ''}`, { autoPan: false }).addTo(map);
                    });
                    if (latlngs.length > 1) { 
                        const line = L.polyline(latlngs, { color: '#ef4444', weight: 6, opacity: 0.8 }).addTo(map);
                        routeLayersRef.current.push(line);
                    }
                    return;
                }

                if (places && places.length > 0) {
                    places.forEach((place, index) => {
                        if (!place.lat || !place.lng) return;
                        const latlng = [place.lat, place.lng];
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-2 border-white shadow-lg ${isHovered ? 'bg-blue-600 scale-110 z-50' : 'bg-blue-500'} text-white font-bold text-sm transition-all duration-200">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const marker = L.marker(latlng, { icon: customIcon }).bindPopup(`<b>${place.name}</b><br>${place.time}`, { autoPan: false }).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = marker;
                    });

                    if (places.length > 1) {
                        const validCoords = places.filter(p => p.lat && p.lng);
                        if (validCoords.length > 1) {
                            const coordsString = validCoords.map(p => `${p.lng},${p.lat}`).join(';');
                            const url = `https://router.project-osrm.org/route/v1/driving/${coordsString}?overview=full&geometries=geojson`;

                            fetch(url)
                                .then(res => res.json())
                                .then(data => {
                                    if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                                        const routeLayer = L.geoJSON(data.routes[0].geometry, {
                                            style: { color: '#3b82f6', weight: 8, opacity: 0.8, dashArray: null }
                                        }).addTo(map);
                                        routeLayersRef.current.push(routeLayer);
                                    } else {
                                        const latlngs = validCoords.map(p => [p.lat, p.lng]);
                                        const line = L.polyline(latlngs, { color: '#3b82f6', weight: 6, opacity: 0.8 }).addTo(map);
                                        routeLayersRef.current.push(line);
                                    }
                                })
                                .catch(() => {
                                    const latlngs = validCoords.map(p => [p.lat, p.lng]);
                                    const line = L.polyline(latlngs, { color: '#3b82f6', weight: 6, opacity: 0.8 }).addTo(map);
                                    routeLayersRef.current.push(line);
                                });
                        }
                    }
                }
            }, [places, subwayPath, hoveredId]);

            return <div ref={mapRef} className="w-full h-full z-0" />;
        });

                                        <div className="flex justify-between items-start mb-2">
                                            <div className="flex-1 min-w-0 mr-2">
                                                <div className="flex items-center gap-2 mb-1"><input type="text" value={activeDayData?.title || ""} onChange={handleDayTitleChange} className="text-xl font-bold text-slate-100 bg-transparent outline-none border border-transparent hover:border-slate-700 focus:border-blue-500 rounded px-1 -ml-1 transition-colors w-full"/><button onClick={handleRefreshWeather} className="shrink-0 text-xs bg-blue-900/50 text-blue-400 px-2 py-1 rounded-full flex items-center gap-1" title="更新天氣"><Icons.Refresh size={12} className={isWeatherLoading ? "animate-spin" : ""} /></button></div>
                                                <div className="flex items-center gap-2"><div className="flex items-center gap-1 bg-slate-800 px-2 py-0.5 rounded-full border border-slate-700"><WeatherIcon type={activeDayData?.weather.type || 'sun'} size={14} /><span className="text-xs text-slate-300 font-medium">{activeDayData?.weather.minTemp || 0}°C~{activeDayData?.weather.maxTemp || 0}°C {activeDayData?.weather.label || ""}</span></div></div>
                                            </div>
                                            <div className="flex gap-2 shrink-0"><button onClick={() => setShowDeleteDayConfirm(true)} className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-900/20 rounded-full transition-colors"><Icons.Trash2 size={18} /></button></div>
                                        </div>
                                        <div className="relative group mt-2">
                                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icons.Search size={16} /></div>
                                            <input type="text" placeholder="搜尋景點並加入..." className="w-full pl-9 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-full text-sm text-slate-100 placeholder-slate-500 focus:bg-slate-800 focus:border-blue-500 outline-none transition-all" value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); setShowSearchResults(true); }} onFocus={() => setShowSearchResults(true)} />
                                            {showSearchResults && searchQuery && (<div className="absolute top-full left-0 right-0 mt-1 bg-slate-800 rounded-xl shadow-2xl border border-slate-700 z-50 max-h-60 overflow-y-auto">{MOCK_PLACES_DB.filter(p => p.name.includes(searchQuery)).map(place => (<div key={place.id} onClick={() => handleSearchResultClick(place)} className="p-3 hover:bg-slate-700 cursor-pointer flex items-center justify-between border-b border-slate-700 last:border-b-0"><div><div className="font-bold text-slate-200 text-sm">{place.name}</div></div><Icons.Plus size={16} className="text-blue-400"/></div>))}</div>)}
                                        </div>
                                    </div>
                                    <div className="px-2 py-4 space-y-4 h-auto md:flex-1 md:overflow-y-auto pb-48">
                                        {activeDayData && activeDayData.places.map((place, index) => (
                                            <div key={place.id} className={`relative pl-1 group transition-all duration-200 ${draggedPlaceIndex === index ? 'dragging' : ''}`} draggable={!editingPlaceId} onDragStart={(e) => onDragStart(e, index)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => onDrop(e, index)}>
                                                {editingPlaceId === place.id ? (
                                                    <div className="bg-slate-800 p-4 rounded-xl border-2 border-blue-500 shadow-xl animate-fade-in relative z-20">
                                                        <input type="text" value={editPlaceForm.name} onChange={(e) => setEditPlaceForm({...editPlaceForm, name: e.target.value})} className="w-full font-bold text-slate-100 bg-slate-900 border-b border-slate-700 focus:border-blue-500 outline-none mb-3" />
                                                        <div className="flex gap-2 justify-end"><button onClick={cancelEditingPlace} className="px-3 py-1 text-slate-400">取消</button><button onClick={saveEditingPlace} className="px-4 py-1 bg-blue-600 rounded text-white">儲存</button></div>
                                                    </div>
                                                ) : (
                                                    <div className={`relative flex items-start gap-3 p-3 rounded-xl border transition-all duration-200 cursor-pointer ${hoveredPlaceId === place.id ? 'bg-slate-800 border-blue-500 shadow-xl translate-x-1' : 'bg-slate-800 border-slate-700 hover:border-slate-600'}`} onClick={() => startEditingPlace(place)} onMouseEnter={() => setHoveredPlaceId(place.id)} onMouseLeave={() => setHoveredPlaceId(null)}>
                                                        <div className="hidden md:block absolute left-1 top-1/2 -translate-y-1/2 text-slate-600 opacity-0 group-hover:opacity-100 cursor-grab active:cursor-grabbing"><Icons.Move size={12}/></div><div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5 z-10 transition-colors ${hoveredPlaceId === place.id ? 'bg-blue-500 text-white' : 'bg-slate-700 text-slate-400'}`}>{index + 1}</div><div className="flex-1 min-w-0"><div className="flex justify-between items-start"><h3 className="font-bold text-slate-100 truncate pr-2">{place.name}</h3><div className="flex items-center text-xs text-slate-400 font-mono bg-slate-900 px-1.5 py-0.5 rounded border border-slate-800"><Icons.Clock size={10} className="mr-1"/>{place.time}</div></div><div className="text-xs text-slate-500 mt-1 flex items-center gap-1"><span className={`px-1.5 py-0.5 rounded text-[10px] ${place.type === 'food' ? 'bg-orange-900/40 text-orange-400' : 'bg-blue-900/40 text-blue-400'}`}>{getCategoryName(place.type)}</span>{place.note && <span className="text-slate-500 truncate max-w-[150px]">- {place.note}</span>}</div></div>
                                                        <div className="flex flex-col gap-2 items-end md:gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity" onClick={(e) => e.stopPropagation()}>
                                                            <button onClick={(e) => { e.stopPropagation(); setPlaceToDelete(place.id); }} className="text-slate-500 hover:text-red-400 transition-colors p-1"><Icons.Trash2 size={16}/></button>
                                                            <div className="md:hidden flex flex-col gap-3 mt-1 bg-slate-900/50 p-1 rounded-lg border border-slate-800"><button onClick={(e) => { e.stopPropagation(); movePlace(index, 'up'); }} className={`p-1 ${index === 0 ? 'text-slate-700' : 'text-blue-400 active:scale-90'}`} disabled={index === 0}><Icons.ChevronUp size={20}/></button><button onClick={(e) => { e.stopPropagation(); movePlace(index, 'down'); }} className={`p-1 ${index === activeDayData.places.length - 1 ? 'text-slate-700' : 'text-blue-400 active:scale-90'}`} disabled={index === activeDayData.places.length - 1}><Icons.ChevronDown size={20}/></button></div>
                                                        </div>
                                                    </div>
                                                )}
                                                {activeDayData && index !== activeDayData.places.length - 1 && <TravelSegmentUI p1={place} p2={activeDayData.places[index+1]} />}
                                            </div>
                                        ))}
                                        <button onClick={() => setShowAddModal(true)} className="w-full py-3 border-2 border-dashed border-slate-700 rounded-xl text-slate-500 font-medium hover:border-blue-500 hover:text-blue-400 hover:bg-blue-900/20 transition-all flex items-center justify-center gap-2"><Icons.Plus size={18} /> 新增行程</button>
                                        <div className="block md:hidden w-full h-[300px] mt-6 rounded-xl overflow-hidden border border-slate-700 shadow-2xl shrink-0"><RealMap places={activeDayData?.places || []} zoomControlKey={activeDayId} /></div>
                                    </div>
                                </div>
                                <div className="flex-1 relative hidden md:block"><RealMap places={activeDayData?.places || []} hoveredId={hoveredPlaceId} zoomControlKey={activeDayId} /></div>
                            </>
                        )}

                        {activeTab === 'subway' && (
                             <div className="w-full h-full flex flex-col items-center justify-center bg-black p-4">
                                 <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Tokyo_subway_map_zh_hant.png/1280px-Tokyo_subway_map_zh_hant.png" alt="東京地鐵路線圖" className="max-w-full max-h-full object-contain shadow-2xl rounded-lg" />
                             </div>
                        )}

                        {/* Modals */}
                        {showAddModal && <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700"><div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">新增行程</h3><button onClick={() => setShowAddModal(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div><form onSubmit={handleManualAddSubmit} className="p-6 space-y-4"><div><label className="block text-sm font-bold text-slate-400 mb-1">名稱</label><input required type="text" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div><div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">時間</label><input type="time" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">類型</label><select value={newItem.type} onChange={e => setNewItem({...newItem, type: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="sight">景點</option><option value="food">餐廳</option><option value="shopping">購物</option><option value="transport">交通</option></select></div></div><button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-2">確認新增</button></form></div></div>}
                        
                        {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700"><div className="p-6 text-center"><h3 className="font-bold text-lg text-slate-100 mb-2">確定要刪除此日行程嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2.5 border border-slate-700 rounded-xl font-bold text-slate-400 hover:bg-slate-700 transition-colors">取消</button><button onClick={confirmDeleteDay} className="flex-1 py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold transition-colors">確認刪除</button></div></div></div></div>)}
                        
                        {placeToDelete && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700"><div className="p-6 text-center"><h3 className="font-bold text-lg text-slate-100 mb-2">確定要刪除此行程嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setPlaceToDelete(null)} className="flex-1 py-2.5 border border-slate-700 rounded-xl font-bold text-slate-400 hover:bg-slate-700 transition-colors">取消</button><button onClick={confirmDeletePlace} className="flex-1 py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold transition-colors">確認刪除</button></div></div></div></div>)}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
