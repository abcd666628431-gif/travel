        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin) };
        };

            FileText: (p) => <Icon {...p} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />,
            ArrowRight: (p) => <Icon {...p} path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
            ChevronDownSmall: (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9"/>} />,
            Sun: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>} />,
            Cloud: (p) => <Icon {...p} path={<><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></>} />,
            CloudRain: (p) => <Icon {...p} path={<><line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></>} />,
            Utensils: (p) => <Icon {...p} path={<><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></>} />,
            Hotel: (p) => <Icon {...p} path={<><path d="M10 22v-6.57"/><path d="M12 11h.01"/><path d="M12 7h.01"/><path d="M14 11h.01"/><path d="M14 7h.01"/><path d="M16 11h.01"/><path d="M16 7h.01"/><path d="M18 11h.01"/><path d="M18 7h.01"/><path d="M4 11h.01"/><path d="M4 7h.01"/><path d="M6 11h.01"/><path d="M6 7h.01"/><path d="M8 11h.01"/><path d="M8 7h.01"/><rect x="4" y="2" width="16" height="20" rx="2"/></>} />,
            Image: (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />,
            ArrowLeft: (p) => <Icon {...p} path={<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>} />,
            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Lock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></>} />,
            Unlock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></>} />,
            GripVertical: (p) => <Icon {...p} path={<><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>} />,
            Camera: (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />
        };

        const TravelSegmentUI = ({ p1, p2, onMouseEnter, onMouseLeave, travelMode, setTravelMode }) => {
            const travelInfo = calculateTravelInfo(p1, p2);
            if (!travelInfo) return <div className="h-8 px-3 rounded-full border border-slate-700 bg-slate-800/50 flex items-center gap-1 text-[10px] text-slate-500"><span>🚗</span><span>計算中</span></div>;
            return (
                <div 
                    className="flex items-center gap-3 py-1 animate-fade-in group cursor-pointer"
                    onMouseEnter={onMouseEnter}
                    onMouseLeave={onMouseLeave}
                >
                    <div className="flex bg-slate-800 border border-slate-700 rounded-md p-0.5 shadow-md group-hover:border-amber-500 transition-colors">
                        <button onClick={() => setTravelMode('drive')} className={`p-1 rounded transition-all flex items-center justify-center ${travelMode === 'drive' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`}><Icons.Bus size={12} /></button>
                        <button onClick={() => setTravelMode('walk')} className={`p-1 rounded transition-all flex items-center justify-center ${travelMode === 'walk' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`}><Icons.Walking size={12} /></button>
                    </div>
                    <div className="text-xs font-bold text-slate-400 group-hover:text-amber-400 transition-colors">
                        約 {travelMode === 'walk' ? travelInfo.walk : travelInfo.drive}
                    </div>
                </div>
            );
        };

        const WeatherIcon = ({ type, size = 16 }) => {
            switch(type) {
                case 'sun': return <Icons.Sun size={size} className="text-orange-500" />;
                case 'cloud': return <Icons.Cloud size={size} className="text-gray-500" />;
                case 'rain': return <Icons.CloudRain size={size} className="text-blue-500" />;
                default: return <Icons.Sun size={size} className="text-orange-500" />;
            }
        };

        const CategoryIcon = ({ type }) => {
            const baseClass = "w-10 h-10 rounded-full flex items-center justify-center text-white";
            switch(type) {
                case 'food': return <div className={`${baseClass} bg-orange-400`}><Icons.Utensils size={20} /></div>;
                case 'shopping': return <div className={`${baseClass} bg-pink-400`}><Icons.ShoppingBag size={20} /></div>;
                case 'transport': return <div className={`${baseClass} bg-blue-400`}><Icons.Bus size={20} /></div>;
                case 'sight': return <div className={`${baseClass} bg-green-500`}><Icons.MapPin size={20} /></div>;
                case 'accommodation': return <div className={`${baseClass} bg-purple-500`}><Icons.Hotel size={20} /></div>;
                default: return <div className={`${baseClass} bg-gray-400`}><Icons.FileText size={20} /></div>;
            }
        };

        const getCategoryName = (type) => {
            const map = { food: '餐飲', shopping: '購物', transport: '交通', sight: '景點', accommodation: '住宿' };
            return map[type] || '其他';
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, mapCenterRef }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5312, 114.1136], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
                
                map.on('move', () => {
                    if (mapCenterRef) mapCenterRef.current = map.getCenter();
                });

                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => [p.lat, p.lng]));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6'; 

                const validPlaces = places.filter(p => p.lat && p.lng);
                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode}`)) + markerColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) map.removeLayer(markersRef.current[id].marker);
                    delete markersRef.current[id];
                });
                
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    delete routeLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const marker = L.marker([place.lat, place.lng], { icon: customIcon }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i];
                                const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                
                                const mode = p1.travelMode === 'walk' ? 'foot' : 'driving';
                                const segmentKey = `${p1.id}-${p2.id}-${mode}`;
                                
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;
                                if (!geoData) {
                                    const url = `https://router.project-osrm.org/route/v1/${mode}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson`;
                                    try {
                                        const res = await fetch(url);
                                        const data = await res.json();
                                        geoData = (data.code === 'Ok' && data.routes?.[0]?.geometry) || 'straight_line';
                                    } catch (e) { geoData = 'straight_line'; }
                                    if (!window.routeCache) window.routeCache = {};
                                    window.routeCache[segmentKey] = geoData;
                                }

                                if (!isMounted || !mapInstanceRef.current) return;
                                const outline = geoData === 'straight_line' ? L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: '#ffffff', weight: 12 }).addTo(map) : L.geoJSON(geoData, { style: { color: '#ffffff', weight: 12 } }).addTo(map);
                                const main = geoData === 'straight_line' ? L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], { color: routeColor, weight: 8 }).addTo(map) : L.geoJSON(geoData, { style: { color: routeColor, weight: 8 } }).addTo(map);
                                if (main.bringToBack) main.bringToBack(); outline.bringToBack();
                                routeLayersRef.current[segmentKey] = { outline, main, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            useEffect(() => {
                Object.entries(markersRef.current).forEach(([placeId, data]) => {
                    const isHovered = hoveredId === placeId;
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${data.baseColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${data.index + 1}</div>`;
                    data.marker.setIcon(L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32] }));
                    if (isHovered) data.marker.openPopup(); else data.marker.closePopup();
                });
            }, [hoveredId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

        // ==========================================
        // Main Planner Component
        // ==========================================
        function TripPlanner({ tripId, onBack, db, appId, user }) {
            const [trip, setTrip] = useState(INITIAL_TRIP);
            const [members, setMembers] = useState(INITIAL_MEMBERS);
            const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
            const [shoppingItems, setShoppingItems] = useState(INITIAL_SHOPPING_ITEMS);
            const [packingList, setPackingList] = useState(INITIAL_PACKING_LIST);
            
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [activeDayId, setActiveDayId] = useState(1);
            const [isEditing, setIsEditing] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const mapCenterRef = useRef({ lat: 22.5312, lng: 114.1136 });
            const [newItem, setNewItem] = useState({ name: '', time: '12:00', type: 'sight', note: '' });

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                const unsubscribe = window.FirebaseSDK.onSnapshot(tripDocRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        if (data.trip) setTrip(data.trip);
                        if (data.members) setMembers(data.members);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.shoppingItems) setShoppingItems(data.shoppingItems);
                        if (data.packingList) setPackingList(data.packingList);
                    }
                });
                return () => unsubscribe();
            }, [user, tripId]);

            const pushUpdate = (newData) => {
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                window.FirebaseSDK.updateDoc(tripDocRef, newData);
            };

            const activeDayData = useMemo(() => trip.days.find(d => d.id === activeDayId) || trip.days[0], [trip, activeDayId]);

            const updatePlaceTravelMode = (dayId, placeId, mode) => {
                const newDays = trip.days.map(d => d.id === dayId ? { ...d, places: d.places.map(p => p.id === placeId ? { ...p, travelMode: mode } : p) } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
            };

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const center = mapCenterRef.current;
                const newPlace = { id: 'p' + Date.now(), ...newItem, lat: center.lat, lng: center.lng, travelMode: 'drive' };
                const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: [...d.places, newPlace] } : d);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setShowAddModal(false);
                setNewItem({ name: '', time: '12:00', type: 'sight', note: '' });
            };

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3 flex-1">
                            <button onClick={onBack} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 transition-colors"><Icons.ArrowLeft size={20} /></button>
                            <h1 className="font-bold truncate">{trip.title}</h1>
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${isEditing ? 'bg-green-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                            {isEditing ? '正在編輯' : '預覽模式'}
                        </button>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-full md:w-[400px] flex flex-col border-r border-slate-800 overflow-y-auto">
                            <div className="p-4 space-y-4">
                                {activeDayData?.places.map((place, index) => (
                                    <div key={place.id} className="space-y-2">
                                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <div className="flex justify-between items-start">
                                                <h3 className="font-bold">{place.name}</h3>
                                                <span className="text-xs text-slate-500">{place.time}</span>
                                            </div>
                                            <p className="text-xs text-slate-400 mt-1">{place.note || '無備註'}</p>
                                        </div>
                                        {index < activeDayData.places.length - 1 && (
                                            <TravelSegmentUI 
                                                p1={place} 
                                                p2={activeDayData.places[index+1]} 
                                                travelMode={place.travelMode || 'drive'}
                                                setTravelMode={(mode) => updatePlaceTravelMode(activeDayId, place.id, mode)}
                                            />
                                        )}
                                    </div>
                                ))}
                                {isEditing && (
                                    <button onClick={() => setShowAddModal(true)} className="w-full py-3 border-2 border-dashed border-slate-700 rounded-xl text-slate-500 hover:text-blue-400">+ 新增景點</button>
                                )}
                            </div>
                        </div>
                        <div className="flex-1 relative hidden md:block">
                            <RealMap places={activeDayData?.places || []} zoomControlKey={activeDayId} dayColor={activeDayData?.color} mapCenterRef={mapCenterRef} />
                        </div>
                    </div>

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-800 rounded-2xl p-6 max-w-sm w-full space-y-4 border border-slate-700">
                                <h3 className="font-bold text-lg">新增景點 (將建立在目前地圖中心)</h3>
                                <input required type="text" placeholder="名稱" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg" />
                                <input type="time" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg" />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowAddModal(false)} className="flex-1 py-2 bg-slate-700 rounded-lg">取消</button>
                                    <button onClick={handleManualAddSubmit} className="flex-1 py-2 bg-blue-600 rounded-lg">新增</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [activeTripId, setActiveTripId] = useState(null);
            const { db, auth } = getFirebaseContext();

            useEffect(() => {
                window.FirebaseSDK.signInAnonymously(auth);
                window.FirebaseSDK.onAuthStateChanged(auth, u => {
                    setUser(u);
                    if(u) setActiveTripId('trip-sz-macau');
                });
            }, []);

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900">載入中...</div>;

            return <TripPlanner tripId={activeTripId} db={db} appId="shared-trip-v1" user={user} onBack={() => {}} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
