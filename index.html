<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer" />
    <title>旅遊行程規劃助手 - 完美路線版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script type="module">
        import { initializeApp } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { 
            initializeApp, 
            getAuth, signInAnonymously, onAuthStateChanged, 
            getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, 
            doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc 
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #0f172a; height: 100dvh; width: 100vw; color: #f3f4f6; }
        #root { height: 100%; width: 100%; }
        .leaflet-div-icon { background: transparent; border: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-toast { animation: fadeIn 0.3s ease-out forwards; }
        
        .dragging {
            opacity: 1 !important;
            background: #1e293b;
            border: 2px dashed #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transform: scale(1.02);
            z-index: 50;
        }

        .bg-white { background-color: #1f2937 !important; }
        .bg-gray-50 { background-color: #111827 !important; }
        .bg-gray-100 { background-color: #374151 !important; }
        .bg-gray-200 { background-color: #4b5563 !important; }
        .text-gray-900 { color: #f9fafb !important; }
        .text-gray-800 { color: #f3f4f6 !important; }
        .text-gray-700 { color: #e5e7eb !important; }
        .text-gray-600 { color: #d1d5db !important; }
        .text-gray-500 { color: #9ca3af !important; }
        .text-gray-400 { color: #6b7280 !important; }
        .border-gray-200 { border-color: #4b5563 !important; }
        .border, .border-t, .border-b, .border-l, .border-r, .border-b-2, .border-2 { border-color: #4b5563; }
        
        .bg-blue-50 { background-color: rgba(59, 130, 246, 0.15) !important; }
        .bg-blue-100 { background-color: rgba(59, 130, 246, 0.25) !important; }
        .text-blue-600 { color: #60a5fa !important; }
        
        input:not(.bg-transparent), select {
            background-color: #374151 !important;
            color: #f3f4f6 !important;
            border-color: #4b5563 !important;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

        img[alt="東京地鐵路線圖"] {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            databaseURL: "https://icarus2-50e01-default-rtdb.firebaseio.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };

        let globalFirebase = null;
        function getFirebaseContext() {
            if (globalFirebase) return globalFirebase;
            const app = window.FirebaseSDK.initializeApp(firebaseConfig);
            const auth = window.FirebaseSDK.getAuth(app);
            let db;
            try {
                db = window.FirebaseSDK.initializeFirestore(app, {
                    localCache: window.FirebaseSDK.persistentLocalCache({
                        tabManager: window.FirebaseSDK.persistentMultipleTabManager()
                    })
                });
            } catch (e) {
                db = window.FirebaseSDK.getFirestore(app);
            }
            globalFirebase = { app, auth, db };
            return globalFirebase;
        }

        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin) };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {
            if (!timeStr) return '';
            let [h, m] = timeStr.split(':').map(Number);
            h = (h + hoursToAdd) % 24;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };

        const INITIAL_TRIP = {
            id: 'trip-sz-macau',
            title: '深圳澳門四日遊',
            dates: `2026/04/03 - 2026/04/06`,
            icon: '🇲🇴',
            author: 'CANDY',
            days: [
                {
                    id: 1, date: '2026/04/03 (五)', title: '深圳出發', color: '#f9115d', weather: { type: 'cloud', minTemp: 22, maxTemp: 28, label: '多雲' },
                    places: [
                        { id: 'p1', time: '12:00', name: '羅湖口岸出口', type: 'transport', lat: 22.5312, lng: 114.1136, note: '集合', travelMode: 'drive' },
                        { id: 'p2', time: '13:09', name: '玩壹把电竞酒店', type: 'accommodation', lat: 22.5400, lng: 114.0500, note: 'Check-in', travelMode: 'drive' },
                        { id: 'p3', time: '14:30', name: '燒肉公社（梅林店）', type: 'food', lat: 22.5600, lng: 114.0400, note: '午餐', travelMode: 'drive' },
                        { id: 'p4', time: '15:58', name: '寶可夢 (壹方城購物中心)', type: 'shopping', lat: 22.5533, lng: 113.8870, note: '', travelMode: 'drive' },
                        { id: 'p5', time: '18:39', name: '(跳格子) (金光華廣場)', type: 'sight', lat: 22.5390, lng: 114.1180, note: '', travelMode: 'drive' },
                        { id: 'p6', time: '19:39', name: '按摩 (玖玖·影院足道)', type: 'sight', lat: 22.5360, lng: 114.0550, note: '福田COCO Park', travelMode: 'drive' },
                        { id: 'p7', time: '20:59', name: '野妹火锅（东门町店）', type: 'food', lat: 22.5450, lng: 114.1170, note: '晚餐', travelMode: 'drive' },
                        { id: 'p8', time: '22:08', name: '玩壹把电竞酒店', type: 'accommodation', lat: 22.5400, lng: 114.0500, note: '休息', travelMode: 'drive' }
                    ]
                }
            ]
        };

        const INITIAL_MEMBERS = [
            { id: 'm1', name: 'CANDY', color: 'bg-pink-500', avatar: '👩' },
            { id: 'm2', name: '神雲', color: 'bg-blue-500', avatar: '🧑' },
            { id: 'm3', name: 'Neko Leung', color: 'bg-yellow-500', avatar: '🐱' },
            { id: 'm4', name: 'Mok Max', color: 'bg-green-500', avatar: '🧑' }
        ];

        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );

        const Icons = {
            ArrowLeft: (p) => <Icon {...p} path={<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/></>} />,
            Plus: (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
            Trash2: (p) => <Icon {...p} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
            Walking: (p) => <Icon {...p} path={<><path d="m9 20 1-5"/><path d="M10.7 7.5c-1.1.2-2.1.8-2.8 1.7L5.1 12"/><path d="M17 22V11l-2-3"/><path d="M15 15.5 17 22"/><path d="m15 15.5-3-4.5"/><path d="M12.5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/></>} />,
            Bus: (p) => <Icon {...p} path={<><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/></>} />,
            GripVertical: (p) => <Icon {...p} path={<><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>} />,
            X: (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
            Image: (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />
        };

        // --- 地圖線路繪製組件 ---
        const RealMap = React.memo(({ places, dayColor }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef([]);
            const linesRef = useRef([]);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5312, 114.1136], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                mapInstanceRef.current = map;
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map || places.length === 0) return;

                // 1. 清除舊的 Marker 與 Line
                markersRef.current.forEach(m => map.removeLayer(m));
                linesRef.current.forEach(l => map.removeLayer(l));
                markersRef.current = [];
                linesRef.current = [];

                // 2. 畫新的 Marker
                const bounds = L.latLngBounds();
                places.forEach((p, idx) => {
                    if (!p.lat || !p.lng) return;
                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="background:${dayColor || '#3b82f6'}; width:24px; height:24px; border-radius:50%; border:2px solid white; color:white; font-weight:bold; display:flex; align-items:center; justify-content:center; font-size:12px;">${idx+1}</div>`,
                        iconSize: [24, 24]
                    });
                    const marker = L.marker([p.lat, p.lng], { icon }).addTo(map).bindPopup(p.name);
                    markersRef.current.push(marker);
                    bounds.extend([p.lat, p.lng]);
                });

                if (places.length > 0) map.fitBounds(bounds, { padding: [50, 50] });

                // 3. 畫新的 Line (依據 travelMode)
                const fetchRoutes = async () => {
                    for (let i = 0; i < places.length - 1; i++) {
                        const p1 = places[i];
                        const p2 = places[i+1];
                        // 修正關鍵：依據 travelMode 選擇 API profile (foot = 走路, driving = 開車)
                        const mode = p1.travelMode === 'walk' ? 'foot' : 'driving';
                        const url = `https://router.project-osrm.org/route/v1/${mode}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`;
                        
                        try {
                            const res = await fetch(url);
                            const data = await res.json();
                            if (data.code === 'Ok') {
                                const line = L.geoJSON(data.routes[0].geometry, { style: { color: '#3b82f6', weight: 5, opacity: 0.7 } }).addTo(map);
                                linesRef.current.push(line);
                            }
                        } catch (e) { console.error("Route error", e); }
                    }
                };
                fetchRoutes();
            }, [places, dayColor]);

            return <div ref={mapRef} className="w-full h-full z-0" />;
        });

        const TravelSegmentUI = ({ p1, p2, travelMode, setTravelMode }) => {
            const info = calculateTravelInfo(p1, p2);
            return (
                <div className="flex items-center gap-3 py-2 px-1 animate-fade-in group">
                    <div className="flex bg-slate-800 border border-slate-700 rounded-md p-0.5 shadow-md">
                        <button onClick={() => setTravelMode('drive')} className={`p-1 rounded transition-all ${travelMode === 'drive' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}><Icons.Bus size={12} /></button>
                        <button onClick={() => setTravelMode('walk')} className={`p-1 rounded transition-all ${travelMode === 'walk' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}><Icons.Walking size={12} /></button>
                    </div>
                    <div className="text-xs font-bold text-slate-400">
                        {travelMode === 'walk' ? `步行 ${info?.walk || '--'}` : `車程 ${info?.drive || '--'}`}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主組件
        // ==========================================
        function TripPlanner({ tripId, db, appId, user }) {
            const [trip, setTrip] = useState(INITIAL_TRIP);
            const [activeDayId, setActiveDayId] = useState(1);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                const unsubscribe = window.FirebaseSDK.onSnapshot(tripDocRef, (snapshot) => {
                    if (snapshot.exists()) setTrip(snapshot.data().trip);
                });
                return () => unsubscribe();
            }, [user, tripId]);

            const pushUpdate = (newData) => {
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                window.FirebaseSDK.updateDoc(tripDocRef, { trip: newData });
            };

            const updatePlaceTravelMode = (dayId, placeId, mode) => {
                const newDays = trip.days.map(d => {
                    if (d.id === dayId) {
                        return { ...d, places: d.places.map(p => p.id === placeId ? { ...p, travelMode: mode } : p) };
                    }
                    return d;
                });
                const newTrip = { ...trip, days: newDays };
                setTrip(newTrip);
                pushUpdate(newTrip);
            };

            const activeDayData = trip.days.find(d => d.id === activeDayId) || trip.days[0];

            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 relative">
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3">
                            <Icons.ArrowLeft size={20} className="text-slate-400" />
                            <h1 className="font-bold">{trip.title}</h1>
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${isEditing ? 'bg-green-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                            {isEditing ? '編輯中' : '唯讀'}
                        </button>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-full md:w-[400px] flex flex-col border-r border-slate-800 overflow-y-auto p-4 space-y-4">
                            {activeDayData?.places.map((place, index) => (
                                <div key={place.id}>
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 relative">
                                        <div className="flex justify-between">
                                            <h3 className="font-bold">{place.name}</h3>
                                            <span className="text-xs text-slate-500 font-mono">{place.time}</span>
                                        </div>
                                        <p className="text-xs text-slate-400 mt-1">{place.note}</p>
                                    </div>
                                    {index < activeDayData.places.length - 1 && (
                                        <TravelSegmentUI 
                                            p1={place} 
                                            p2={activeDayData.places[index+1]} 
                                            travelMode={place.travelMode || 'drive'}
                                            setTravelMode={(mode) => updatePlaceTravelMode(activeDayId, place.id, mode)}
                                        />
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="flex-1 relative hidden md:block">
                            <RealMap places={activeDayData?.places || []} dayColor={activeDayData?.color} />
                        </div>
                    </div>
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const { db, auth } = getFirebaseContext();

            useEffect(() => {
                window.FirebaseSDK.signInAnonymously(auth);
                window.FirebaseSDK.onAuthStateChanged(auth, setUser);
            }, []);

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;

            return <TripPlanner tripId="trip-sz-macau" db={db} appId="shared-trip-v1" user={user} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
