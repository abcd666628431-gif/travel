        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // --- 座標轉換：高德(GCJ-02) 轉 WGS-84 (國際標準) ---
        const gcj02towgs84 = (lng, lat) => {
            const PI = Math.PI;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;

            const transformLat = (x, y) => {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            };

            const transformLng = (x, y) => {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };

            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [lng * 2 - mglng, lat * 2 - mglat];
        };

                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            };

            let dlat = transformLat(lng - 105.0, lat - 35.0);
            let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI;
            let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic;
            let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            let mglat = lat + dlat;
            let mglng = lng + dlng;
            return [mglng, mglat];
        };

        const calculateTravelInfo = (p1, p2) => {

            m = m % 60;

            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Lock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></>} />,
            Unlock: (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></>} />,
            GripVertical: (p) => <Icon {...p} path={<><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>} />,
            Camera: (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />,
            Pen: (p) => <Icon {...p} path={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></>} />,
            Download: (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />,
            Upload: (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />,
            Image: (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />,
            Sun: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>} />,
            Cloud: (p) => <Icon {...p} path={<><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></>} />,
            CloudRain: (p) => <Icon {...p} path={<><line x1="16" y1="13" x2="16" y2="21"/><line x1="8" y1="13" x2="8" y2="21"/><line x1="12" y1="15" x2="12" y2="23"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></>} />,
            Utensils: (p) => <Icon {...p} path={<><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></>} />,
            Hotel: (p) => <Icon {...p} path={<><path d="M10 22v-6.57"/><path d="M12 11h.01"/><path d="M12 7h.01"/><path d="M14 11h.01"/><path d="M14 7h.01"/><path d="M16 11h.01"/><path d="M16 7h.01"/><path d="M18 11h.01"/><path d="M18 7h.01"/><path d="M4 11h.01"/><path d="M4 7h.01"/><path d="M6 11h.01"/><path d="M6 7h.01"/><path d="M8 11h.01"/><path d="M8 7h.01"/><rect x="4" y="2" width="16" height="20" rx="2"/></>} />,
            ChevronDown: (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9" />} />,
            ChevronUp: (p) => <Icon {...p} path={<polyline points="18 15 12 9 6 15" />} />,
            MoreVertical: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></>} />,
            Pen: (p) => <Icon {...p} path={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></>} />,
        };

        const CategoryIcon = ({ type, size = 20 }) => {
            const baseClass = "rounded-full flex items-center justify-center text-white shrink-0";
            const style = { width: `${size*2}px`, height: `${size*2}px` };
            switch(type) {
                case 'food': return <div className={`${baseClass} bg-orange-400`} style={style}><Icons.Utensils size={size} /></div>;
                case 'shopping': return <div className={`${baseClass} bg-pink-400`} style={style}><Icons.ShoppingBag size={size} /></div>;
                case 'transport': return <div className={`${baseClass} bg-blue-400`} style={style}><Icons.Bus size={size} /></div>;
                case 'sight': return <div className={`${baseClass} bg-green-500`} style={style}><Icons.MapPin size={size} /></div>;
                case 'accommodation': return <div className={`${baseClass} bg-purple-500`} style={style}><Icons.Hotel size={size} /></div>;
                default: return <div className={`${baseClass} bg-gray-400`} style={style}><Icons.FileText size={size} /></div>;
            }
        };

        const WeatherIcon = ({ type, size = 16 }) => {
            switch(type) {
                case 'sun': return <Icons.Sun size={size} className="text-orange-500" />;
                case 'cloud': return <Icons.Cloud size={size} className="text-gray-500" />;
                case 'rain': return <Icons.CloudRain size={size} className="text-blue-500" />;
                default: return <Icons.Sun size={size} className="text-orange-500" />;
            }
        };

        const OnlineUserBadge = () => {
            const [onlineUsers, setOnlineUsers] = useState(1);
            useEffect(() => {
                setOnlineUsers(Math.floor(Math.random() * 5) + 1);
                const interval = setInterval(() => {
                     setOnlineUsers(prev => Math.max(1, prev + (Math.floor(Math.random() * 3) - 1)));
                }, 5000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex items-center gap-1.5 bg-green-50/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20 shrink-0">
                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span>{onlineUsers} 人在線</span>
                </div>
            );
        };

        const TravelSegmentUI = ({ p1, p2, onUpdateMode, onMouseEnter, onMouseLeave }) => {
            const mode = p1.travelMode || 'drive'; 
            const travelInfo = calculateTravelInfo(p1, p2);
            const handleModeChange = (newMode) => {
                if (onUpdateMode) onUpdateMode(newMode);
            };
            if (!travelInfo) return <div className="h-8 px-3 rounded-full border border-slate-700 bg-slate-800/50 flex items-center gap-1 text-[10px] text-slate-500"><span>🚗</span><span>計算中</span></div>;
            
            const getTravelText = () => {
                if (mode === 'straight') return `直線 ${travelInfo.dist.toFixed(1)} km`;
                if (mode === 'walk') return `步行約 ${travelInfo.walk}`;
                return `車程約 ${travelInfo.drive}`;
            };

            return (
                <div 
                    className={`flex items-center gap-3 py-2 px-3.5 bg-slate-800/90 border border-slate-600 shadow-lg rounded-xl animate-fade-in group cursor-pointer hover:border-blue-500 hover:shadow-blue-900/30`}
                    onMouseEnter={onMouseEnter}
                    onMouseLeave={onMouseLeave}
                >
                    <div className="flex bg-slate-900 border border-slate-700 rounded-lg p-0.5 h-8 items-center overflow-hidden">
                        <button onClick={(e) => { e.stopPropagation(); handleModeChange('drive'); }} className={`w-8 h-7 rounded-md transition-all flex items-center justify-center text-[16px] leading-none ${mode === 'drive' ? 'bg-blue-600 text-white shadow-md scale-110' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="開車導航">🚗</button>
                        <button onClick={(e) => { e.stopPropagation(); handleModeChange('walk'); }} className={`w-8 h-7 rounded-md transition-all flex items-center justify-center text-[16px] leading-none ${mode === 'walk' ? 'bg-blue-600 text-white shadow-md scale-110' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="步行導航">🚶</button>
                        <button onClick={(e) => { e.stopPropagation(); handleModeChange('straight'); }} className={`w-8 h-7 rounded-md transition-all flex items-center justify-center ${mode === 'straight' ? 'bg-blue-600 text-white shadow-md scale-110' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="直線連接 (自訂線路)"><Icons.Minus size={14} /></button>
                    </div>
                    <div className="text-sm font-black text-amber-400 group-hover:text-amber-300 transition-colors tracking-wide">
                        {getTravelText()}
                    </div>
                </div>
            );
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '&copy; 高德地圖'
                }).addTo(map);

                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                
                if (tempMarkerRef.current) {
                    map.removeLayer(tempMarkerRef.current);
                    tempMarkerRef.current = null;
                }
                
                if (tempMarker) {
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce" style="z-index: 2000;">📍</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    const [gLng, gLat] = wgs84togcj02(tempMarker.lng, tempMarker.lat);
                    const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                    marker.openPopup();
                    map.setView([gLat, gLng], 15, { animate: true });
                    tempMarkerRef.current = marker;
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => {
                         const [gLng, gLat] = wgs84togcj02(p.lng, p.lat);
                         return [gLat, gLng];
                     }));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';

                const validPlaces = places.filter(p => p.lat && p.lng);

                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor + routeColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => {
                    if (map.hasLayer(markersRef.current[id].marker)) { map.removeLayer(markersRef.current[id].marker); }
                    delete markersRef.current[id];
                });
                
                Object.keys(routeLayersRef.current).forEach(key => {
                    const layers = routeLayersRef.current[key];
                    if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline);
                    if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main);
                    if (layers.alts) {
                        layers.alts.forEach(altLayer => {
                            if (map.hasLayer(altLayer)) map.removeLayer(altLayer);
                        });
                    }
                    delete routeLayersRef.current[key];
                });

                if (validPlaces.length > 0) {
                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const [gLng, gLat] = wgs84togcj02(place.lng, place.lat);
                        const marker = L.marker([gLat, gLng], { icon: customIcon }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };

                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i];
                                const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                
                                const travelMode = p1.travelMode || 'drive';
                                const segmentKey = `${p1.id}-${p2.id}-${p1.lat},${p1.lng}-${p2.lat},${p2.lng}-${travelMode}`;
                                
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;

                                if (!geoData) {
                                    if (travelMode === 'straight') {
                                        geoData = ['straight_line']; 
                                        if (!window.routeCache) window.routeCache = {};
                                        window.routeCache[segmentKey] = geoData;
                                    } else {
                                        const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                        const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson&alternatives=true`;
                                        try {
                                            const res = await fetch(url);
                                            if (res.ok) {
                                                const data = await res.json();
                                                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                                                    geoData = data.routes.map(r => r.geometry);
                                                } else {
                                                    geoData = ['straight_line']; 
                                                }
                                            } else {
                                                geoData = ['straight_line'];
                                            }
                                        } catch (e) {
                                            geoData = ['straight_line'];
                                        }
                                        if (!window.routeCache) window.routeCache = {};
                                        window.routeCache[segmentKey] = geoData;
                                    }
                                }

                                if (!isMounted || !mapInstanceRef.current) return;

                                let outline, main;
                                let alts = [];
                                
                                const geometries = Array.isArray(geoData) ? geoData : [geoData];
                                const selectedIndex = p1.routeIndex || 0;
                                const validIndex = selectedIndex < geometries.length ? selectedIndex : 0;

                                if (geometries.length > 1) {
                                    geometries.forEach((geo, idx) => {
                                        if (idx === validIndex || geo === 'straight_line') return;
                                        const altStyle = { color: '#94a3b8', weight: 6, opacity: 0.8, lineCap: 'round', lineJoin: 'round', dashArray: '5, 10' };
                                        const clickStyle = { color: 'transparent', weight: 20, opacity: 0 }; 
                                        const geoGCJ = JSON.parse(JSON.stringify(geo));
                                        if(geoGCJ.coordinates) geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                        const altMain = L.geoJSON(geoGCJ, { style: altStyle }).addTo(mapInstanceRef.current);
                                        const altClick = L.geoJSON(geoGCJ, { style: clickStyle }).addTo(mapInstanceRef.current);
                                        altClick.on('click', () => { if (onRouteAltSelect) onRouteAltSelect(p1.id, idx); });
                                        altClick.on('mouseover', () => { altMain.setStyle({ color: '#cbd5e1', weight: 8, cursor: 'pointer' }); if (altMain.bringToFront) altMain.bringToFront(); });
                                        altClick.on('mouseout', () => altMain.setStyle(altStyle));
                                        alts.push(altMain, altClick);
                                    });
                                }

                                const mainGeo = geometries[validIndex];
                                if (mainGeo === 'straight_line') {
                                    const [gLng1, gLat1] = wgs84togcj02(p1.lng, p1.lat);
                                    const [gLng2, gLat2] = wgs84togcj02(p2.lng, p2.lat);
                                    outline = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline([[gLat1, gLng1], [gLat2, gLng2]], mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    const geoGCJ = JSON.parse(JSON.stringify(mainGeo));
                                    if(geoGCJ.coordinates) geoGCJ.coordinates = geoGCJ.coordinates.map(c => wgs84togcj02(c[0], c[1]));
                                    outline = L.geoJSON(geoGCJ, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(geoGCJ, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                if (main.bringToFront) main.bringToFront();
                                routeLayersRef.current[segmentKey] = { outline, main, alts, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;
        });

        function Dashboard({ trips, onCreateTrip, onSelectTrip, onDeleteTrip, onImportTrip, onExportTrip, toast }) {
            const fileInputRef = useRef(null);
            return (
                <div className="flex justify-center h-full bg-[#0f172a] overflow-y-auto w-full relative">
                    {toast && (<div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 border border-slate-700"><span>{toast}</span></div></div>)}
                    <div className="max-w-[960px] w-full px-4 md:px-0">
                        <div className="my-10"><h1 className="text-3xl font-bold mb-4 text-slate-100">我的行程</h1></div>
                        <div className="my-8 flex justify-end gap-3 flex-wrap">
                            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={onImportTrip} />
                            <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg border border-slate-600"><Icons.Upload size={20} /> 匯入行程</button>
                            <button onClick={onCreateTrip} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-900/30"><Icons.Plus size={20} /> 建立新行程</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                            {trips.map((tripData, index) => (
                                <div key={tripData.id} onClick={() => onSelectTrip(tripData.id)} className="relative bg-slate-800 rounded-2xl overflow-hidden shadow-xl border border-slate-700 hover:border-blue-500 transition-all cursor-pointer group flex flex-col h-[280px]">
                                    <div className="h-40 overflow-hidden relative">
                                        <img src={`https://assets.funliday.com/trip-default-cover/${(index % 20) + 30}.png`} alt="cover" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div>
                                    </div>
                                    <div className="p-5 flex-1 flex flex-col justify-end bg-slate-800 relative z-10 -mt-4 rounded-t-xl">
                                        <h3 className="font-bold text-lg text-slate-100 truncate">{tripData.trip?.title || '未命名行程'}</h3>
                                        <p className="text-sm text-slate-400 mt-1">{tripData.trip?.dates || '未設定日期'}</p>
                                    </div>
                                    <div className="absolute top-3 right-3 flex items-start gap-2">
                                        <div className="flex -space-x-2">
                                            {(tripData.members || []).slice(0, 3).map((m, i) => (<div key={i} className={`w-8 h-8 rounded-full border-2 border-slate-800 flex items-center justify-center text-xs text-white ${m.color || 'bg-slate-600'}`}>{m.avatar || '👤'}</div>))}
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); onExportTrip(tripData); }} className="w-8 h-8 bg-slate-900/60 hover:bg-blue-500/80 rounded-full flex items-center justify-center text-white transition-colors"><Icons.Download size={14} /></button>
                                            <button onClick={(e) => { e.stopPropagation(); onDeleteTrip(tripData.id); }} className="w-8 h-8 bg-slate-900/60 hover:bg-red-500/80 rounded-full flex items-center justify-center text-white transition-colors"><Icons.Trash2 size={14} /></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function TripPlanner({ tripId, onBack, db, appId, user }) {
            const [trip, setTrip] = useState({ title: '', dates: '', days: [] });
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [shoppingItems, setShoppingItems] = useState([]);
            const [packingList, setPackingList] = useState([]);
            
            const AMAP_KEY = '3bf27a17038b433640ab774dafa1d0a6'; 

            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [activeDayId, setActiveDayId] = useState(1);
            const [panelMode, setPanelMode] = useState('list'); 
            const [newItem, setNewItem] = useState({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' });
            
            const [tempMarker, setTempMarker] = useState(null);
            const [addressSuggestions, setAddressSuggestions] = useState([]);
            const [isSearchingAddress, setIsSearchingAddress] = useState(false);
            const [hoveredPlaceId, setHoveredPlaceId] = useState(null);
            const [dragEnabledId, setDragEnabledId] = useState(null);
            const [hoveredSegmentId, setHoveredSegmentId] = useState(null);
            const [toast, setToast] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [draggedPlaceIndex, setDraggedPlaceIndex] = useState(null);
            const searchTimeoutRef = useRef(null);
            const daysContainerRef = useRef(null);
            const [expandedNotes, setExpandedNotes] = useState({});

            // Modals
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showShoppingModal, setShowShoppingModal] = useState(false);
            const [showPackingModal, setShowPackingModal] = useState(false);
            const [showSettlementPlan, setShowSettlementPlan] = useState(false); 
            const [showMemberSettings, setShowMemberSettings] = useState(false);
            const [showDeleteDayConfirm, setShowDeleteDayConfirm] = useState(false);
            const [placeToDelete, setPlaceToDelete] = useState(null);
            const [expenseToDelete, setExpenseToDelete] = useState(null);
            const [shoppingToDelete, setShoppingToDelete] = useState(null);

            const [expenseFilter, setExpenseFilter] = useState('all'); 
            const [packingFilter, setPackingFilter] = useState('all'); 
            const [displayCurrency, setDisplayCurrency] = useState('HKD');
            const [addModalTab, setAddModalTab] = useState('custom');
            const [newPackingItem, setNewPackingItem] = useState({ text: '', owner: '' });
            const [newExpenseItem, setNewExpenseItem] = useState({ date: '2026-04-03', title: '', category: 'food', payer: '', amount: '', currency: 'JPY', sharedBy: [], image: null });
            const [newShoppingItem, setNewShoppingItem] = useState({ name: '', qty: 1, price: 0, currency: 'MOP', requester: '', note: '', image: null });

            useEffect(() => {
                if (!user || !tripId) return;
                const tripDocRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId);
                return window.FirebaseSDK.onSnapshot(tripDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.trip) setTrip(data.trip);
                        if (data.members) setMembers(data.members);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.shoppingItems) setShoppingItems(data.shoppingItems);
                        if (data.packingList) setPackingList(data.packingList);
                        if (!activeDayId && data.trip?.days?.length > 0) setActiveDayId(data.trip.days[0].id);
                    }
                });
            }, [user, tripId]);

            const pushUpdate = (data) => window.FirebaseSDK.updateDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripId), data);
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const activeDayData = useMemo(() => trip.days?.find(d => d.id === activeDayId) || trip.days?.[0], [trip, activeDayId]);
            const getMemberInfo = useCallback((name) => members.find(m => m.name === name) || { color: 'bg-gray-400', avatar: '👤' }, [members]);

            const stateRef = useRef({ trip, activeDayId, hoveredPlaceId, panelMode, newItem });
            useEffect(() => { stateRef.current = { trip, activeDayId, hoveredPlaceId, panelMode, newItem }; }, [trip, activeDayId, hoveredPlaceId, panelMode, newItem]);

            useEffect(() => {
                const handleGlobalPaste = (e) => {
                    if (activeTab !== 'itinerary') return;
                    const items = e.clipboardData?.items;
                    if (!items) return;
                    let imageFile = null;
                    for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf('image') !== -1) { imageFile = items[i].getAsFile(); break; } }
                    if (imageFile) {
                        const current = stateRef.current;
                        let targetPlaceId = (current.panelMode === 'edit' && current.newItem.id) ? current.newItem.id : current.hoveredPlaceId;
                        if (targetPlaceId) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = new Image();
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    let w = img.width, h = img.height;
                                    if (w > 800 || h > 800) { if (w > h) { h *= 800/w; w = 800; } else { w *= 800/h; h = 800; } }
                                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                    const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                                    const targetPlace = current.trip.days.flatMap(d => d.places).find(p => p.id === targetPlaceId);
                                    const targetName = targetPlace?.name;
                                    const newDays = current.trip.days.map(d => ({
                                        ...d,
                                        places: d.places.map(p => (p.id === targetPlaceId || (targetName && p.name === targetName)) ? { ...p, image: imageDataUrl } : p)
                                    }));
                                    pushUpdate({ trip: { ...current.trip, days: newDays } });
                                    showMsg('✅ 圖片已上傳並同步同名卡片');
                                };
                                img.src = event.target.result;
                            };
                            reader.readAsDataURL(imageFile);
                        }
                    }
                };
                document.addEventListener('paste', handleGlobalPaste);
                return () => document.removeEventListener('paste', handleGlobalPaste);
            }, [activeTab]);

            const handleAddressInput = (e) => {
                const val = e.target.value; setNewItem(p => ({...p, address: val}));
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                if (!val.trim()) { setAddressSuggestions([]); return; }
                searchTimeoutRef.current = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(val)}&offset=5&page=1&key=${AMAP_KEY}`);
                        const data = await res.json();
                        if (data.status === '1' && data.pois) setAddressSuggestions(data.pois);
                    } catch(e) {}
                }, 800);
            };

            const handleSuggestionClick = (s) => {
                const name = s.name;
                setNewItem(p => ({...p, address: s.address && s.address.length ? s.address : s.name, name: p.name || name}));
                if (s.location) {
                    const [lngStr, latStr] = s.location.split(',');
                    const [wgsLng, wgsLat] = gcj02towgs84(parseFloat(lngStr), parseFloat(latStr));
                    setTempMarker({ lat: wgsLat, lng: wgsLng, name });
                }
                setAddressSuggestions([]);
            };

            const handleAddressSearch = async () => {
                if (!newItem.address) return showMsg("請輸入地址！");
                setIsSearchingAddress(true);
                try {
                    const res = await fetch(`https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(newItem.address)}&offset=1&page=1&key=${AMAP_KEY}`);
                    const data = await res.json();
                    if (data.status === '1' && data.pois && data.pois.length > 0) {
                        const s = data.pois[0];
                        const [lngStr, latStr] = s.location.split(',');
                        const [wgsLng, wgsLat] = gcj02towgs84(parseFloat(lngStr), parseFloat(latStr));
                        setTempMarker({ lat: wgsLat, lng: wgsLng, name: s.name });
                        setNewItem(p => ({...p, name: p.name || s.name}));
                        showMsg("已找到地點！");
                    } else showMsg("找不到地點");
                } catch(e) {}
                setIsSearchingAddress(false);
            };

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                const lat = tempMarker ? tempMarker.lat : 22.5 + Math.random()*0.1;
                const lng = tempMarker ? tempMarker.lng : 114.1 + Math.random()*0.1;
                const targetName = newItem.name;
                const newP = { id: 'p' + Date.now(), ...newItem, lat, lng, travelMode: 'drive', routeIndex: 0 };
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => p.name === targetName ? { ...p, address: newItem.address || p.address, lat, lng } : p)
                }));
                const dayIdx = newDays.findIndex(d => d.id === activeDayId);
                if (dayIdx !== -1) newDays[dayIdx].places.push(newP);
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
            };

            const handleEditSubmit = (e) => {
                e.preventDefault();
                const targetName = newItem.name;
                const newDays = trip.days.map(d => ({
                    ...d,
                    places: d.places.map(p => {
                        if (p.id === newItem.id) {
                            return { ...p, ...newItem, ...(tempMarker ? { lat: tempMarker.lat, lng: tempMarker.lng } : {}) };
                        } else if (p.name === targetName) {
                            return { ...p, address: newItem.address || p.address, ...(tempMarker ? { lat: tempMarker.lat, lng: tempMarker.lng } : {}) };
                        }
                        return p;
                    })
                }));
                pushUpdate({ trip: { ...trip, days: newDays } });
                setPanelMode('list'); setTempMarker(null);
            };

            // Helpers for tab content
            const togglePacking = (id) => pushUpdate({ packingList: packingList.map(i => i.id === id ? { ...i, checked: !i.checked } : i) });
            const deletePacking = (e, id) => { e.stopPropagation(); pushUpdate({ packingList: packingList.filter(i => i.id !== id) }); };
            
            return (
                <div className="flex flex-col h-[100dvh] bg-slate-900 text-slate-100 font-sans relative">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] animate-toast"><div className="bg-slate-800 text-white px-6 py-3 rounded-full border border-slate-700 shadow-2xl font-bold"><span>{toast}</span></div></div>}
                    {previewImage && <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4" onClick={() => setPreviewImage(null)}><img src={previewImage} className="max-w-full max-h-full object-contain" /></div>}
                    
                    <header className="h-14 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900 shrink-0 z-20 shadow-lg">
                        <div className="flex items-center gap-3 flex-1">
                            <button onClick={onBack} className="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300"><Icons.ArrowLeft size={20} /></button>
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">
                                <input value={trip.icon || '🚀'} onChange={e => pushUpdate({trip:{...trip, icon:e.target.value}})} className="w-full h-full bg-transparent text-center text-lg outline-none" maxLength="2"/>
                            </div>
                            <div className="flex flex-col min-w-0 flex-1">
                                <input value={trip.title} onChange={(e) => pushUpdate({trip:{...trip, title:e.target.value}})} className="text-sm font-bold bg-transparent outline-none w-full" />
                                <input value={trip.dates} onChange={(e) => pushUpdate({trip:{...trip, dates:e.target.value}})} className="text-xs text-slate-500 bg-transparent outline-none w-full" />
                            </div>
                        </div>
                        <OnlineUserBadge />
                    </header>

                    <div className="flex border-b border-slate-800 bg-slate-900 px-4 gap-6 text-sm font-medium overflow-x-auto no-scrollbar">
                        <button onClick={() => setActiveTab('itinerary')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'itinerary' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Map size={18} />行程</button>
                        <button onClick={() => setActiveTab('expenses')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'expenses' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Wallet size={18} />花費</button>
                        <button onClick={() => setActiveTab('shopping')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'shopping' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.ShoppingBag size={18} />待買</button>
                        <button onClick={() => setActiveTab('packing')} className={`py-3 flex items-center gap-2 border-b-2 shrink-0 ${activeTab === 'packing' ? 'border-blue-500 text-blue-500' : 'border-transparent text-slate-500'}`}><Icons.Briefcase size={18} />行李</button>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {activeTab === 'itinerary' && (
                            <>
                                <div className="w-full md:w-[450px] flex flex-col border-r border-slate-800 bg-slate-900 shrink-0 relative z-10 shadow-2xl h-full transition-all">
                                    {panelMode === 'list' ? (
                                        <>
                                            <div ref={daysContainerRef} className="bg-slate-900 border-b border-slate-800 px-3 py-4 flex flex-nowrap gap-3 overflow-x-auto no-scrollbar shadow-sm">
                                                {trip.days?.map((day, idx) => (
                                                    <button key={day.id} onClick={() => setActiveDayId(day.id)} className={`flex flex-col items-start min-w-[100px] shrink-0 p-3 rounded-xl border ${activeDayId === day.id ? 'bg-blue-900/40 border-blue-500 shadow-md' : 'bg-slate-800 border-slate-700'}`}>
                                                        <div className="flex justify-between w-full mb-1.5"><span className={`text-sm font-bold ${activeDayId === day.id ? 'text-blue-400' : 'text-slate-400'}`}>Day {idx + 1}</span><WeatherIcon type={day.weather?.type} size={16} /></div>
                                                        <span className="text-xs text-slate-500">{formatShortDate(day.date)}</span>
                                                    </button>
                                                ))}
                                                <button onClick={handleAddDay} className="min-w-[80px] p-3 rounded-xl border-2 border-dashed border-slate-700 text-slate-500 hover:text-slate-300 flex flex-col items-center justify-center"><Icons.Plus size={18} /><span className="text-xs font-bold">新增</span></button>
                                            </div>
                                            <div className="px-4 py-4 overflow-y-auto flex-1 pb-32">
                                                <div className="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl mb-4 border border-slate-700/50">
                                                    <div className="flex flex-col"><h3 className="font-bold text-blue-400">{activeDayData?.title}</h3></div>
                                                    <button onClick={() => setShowDeleteDayConfirm(true)} className="p-2 text-slate-500 hover:text-red-400 bg-slate-800 rounded-lg border border-slate-700"><Icons.Trash2 size={16} /></button>
                                                </div>
                                                <div className="flex flex-col">
                                                    {activeDayData?.places.map((p, i) => (
                                                        <div key={p.id} className="flex flex-col group/card transition-all duration-200">
                                                            <div className="flex gap-3 items-stretch">
                                                                <div className="flex flex-col items-center w-12 shrink-0">
                                                                    <div className="text-[12px] font-bold text-blue-300 font-mono mb-1.5 pt-1">{p.time}</div>
                                                                    <div onMouseEnter={() => setDragEnabledId(p.id)} className="drag-handle w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold text-white shadow-lg border-2 border-slate-900 cursor-grab">{i+1}</div>
                                                                    {i < activeDayData.places.length - 1 && <div className="w-0.5 bg-slate-700 flex-1 mt-1.5 min-h-[1.5rem]"></div>}
                                                                </div>
                                                                <div className="flex-1 pb-3">
                                                                    <div className={`flex items-start gap-3 p-3 rounded-xl border border-slate-700 bg-slate-800/80 transition-all ${hoveredPlaceId === p.id ? 'border-blue-500 shadow-xl' : ''}`} onMouseEnter={() => setHoveredPlaceId(p.id)} onMouseLeave={() => setHoveredPlaceId(null)}>
                                                                        <div className="w-[60px] h-[60px] bg-slate-700 rounded-lg shrink-0 flex items-center justify-center overflow-hidden cursor-pointer" onClick={() => p.image && setPreviewImage(p.image)}>
                                                                            {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <CategoryIcon type={p.type} size={24} />}
                                                                        </div>
                                                                        <div className="flex-1 min-w-0">
                                                                            <div className="flex justify-between items-start">
                                                                                <div className="flex flex-col">
                                                                                    <div className="flex items-start gap-1">
                                                                                        {p.note && <button onClick={(e) => toggleNote(p.id, e)} className="text-slate-400">{expandedNotes[p.id] ? <Icons.ChevronUp size={16} /> : <Icons.ChevronDown size={16} />}</button>}
                                                                                        <h3 className="font-bold text-slate-100 leading-snug line-clamp-2">{p.name}</h3>
                                                                                    </div>
                                                                                    {p.note && expandedNotes[p.id] && <div className="mt-1 ml-5 text-sm text-slate-300 whitespace-pre-wrap">{p.note}</div>}
                                                                                </div>
                                                                                <div className="flex items-center gap-1 shrink-0 ml-2">
                                                                                    <div className="drag-handle p-1.5 text-slate-500 cursor-grab"><Icons.GripVertical size={18} /></div>
                                                                                    <button onClick={() => {
                                                                                        // 【修復：打開編輯時帶入地址】
                                                                                        setNewItem({ 
                                                                                            id: p.id, 
                                                                                            name: p.name, 
                                                                                            time: p.time, 
                                                                                            type: p.type, 
                                                                                            address: p.address || '', 
                                                                                            note: p.note || '', 
                                                                                            stayTime: p.stayTime || '1' 
                                                                                        });
                                                                                        setPanelMode('edit');
                                                                                    }} className="p-1.5 text-slate-400 hover:text-white"><Icons.MoreVertical size={18} /></button>
                                                                                </div>
                                                                            </div>
                                                                            <div className="text-[11px] text-slate-400 mt-1">停留 {p.stayTime || '1'} 小時</div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            {i < activeDayData.places.length - 1 && (
                                                                <div className="flex items-stretch gap-3">
                                                                    <div className="flex flex-col items-center w-12 shrink-0"><div className="text-[11px] font-bold text-slate-400 font-mono">{getEndTime(p.time, parseFloat(p.stayTime || 1))}</div><div className="w-2.5 h-2.5 rounded-full bg-amber-500/50 border border-amber-500"></div><div className="border-l-2 border-dashed border-slate-600 flex-1 mt-1.5 min-h-[2rem]"></div></div>
                                                                    <div className="flex-1 pb-4 -mt-3"><TravelSegmentUI p1={p} p2={activeDayData.places[i+1]} onUpdateMode={(m) => handleUpdateTravelMode(activeDayData.id, p.id, m)} /></div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                                <button onClick={() => { setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' }); setTempMarker(null); setPanelMode('add'); }} className="w-full py-3.5 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 font-bold hover:border-blue-500 hover:text-blue-400 flex items-center justify-center gap-2 mt-4"><Icons.Plus size={18} /> 新增行程景點</button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex flex-col h-full bg-slate-900 animate-fade-in">
                                            <div className="flex items-center bg-slate-900/80 border-b border-slate-700 p-2 sticky top-0 z-20">
                                                <button onClick={() => { setPanelMode('list'); setTempMarker(null); }} className="p-2 text-slate-400"><Icons.ArrowLeft size={20} /></button>
                                                <div className="flex-1 text-center font-bold text-slate-200 pr-8">{panelMode === 'add' ? '新增景點' : '編輯景點資料'}</div>
                                            </div>
                                            {panelMode === 'add' && (
                                                <div className="flex bg-slate-900 border-b border-slate-800">
                                                    <button onClick={() => setAddModalTab('search')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${addModalTab === 'search' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500'}`}><Icons.Search size={18} /><span className="text-[10px] font-bold">搜尋</span></button>
                                                    <button onClick={() => setAddModalTab('custom')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${addModalTab === 'custom' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500'}`}><Icons.Pen size={18} /><span className="text-[10px] font-bold">自訂</span></button>
                                                </div>
                                            )}
                                            <div className="overflow-y-auto p-4 flex-1 pb-32">
                                                {(panelMode === 'edit' || (panelMode === 'add' && addModalTab === 'custom')) && (
                                                    <form onSubmit={panelMode === 'add' ? handleManualAddSubmit : handleEditSubmit} className="space-y-4">
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">景點名稱</label><input required placeholder="*景點名稱" value={newItem.name} onChange={e => setNewItem({...newItem, name:e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                                        <div className="relative"><label className="block text-xs font-bold text-slate-400 mb-1">搜尋地址/關鍵字</label>
                                                            <div className="flex gap-2">
                                                                <input placeholder="輸入地址更新位置" value={newItem.address} onChange={handleAddressInput} className="flex-1 px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none" />
                                                                <button type="button" onClick={handleAddressSearch} className="bg-blue-600 p-2.5 rounded-lg hover:bg-blue-500"><Icons.Search size={18} /></button>
                                                            </div>
                                                            {addressSuggestions.length > 0 && (
                                                                <div className="absolute top-full left-0 right-0 mt-1 bg-slate-800 rounded-xl border border-slate-600 z-[100] shadow-2xl divide-y divide-slate-700">
                                                                    {addressSuggestions.map((s, idx) => (
                                                                        <div key={idx} onClick={() => handleSuggestionClick(s)} className="p-3 hover:bg-slate-700 cursor-pointer">
                                                                            <div className="text-sm font-bold text-slate-100">{s.name}</div>
                                                                            <div className="text-[10px] text-slate-400 truncate">{s.address || s.adname}</div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                        <div className="flex gap-4">
                                                            <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1">抵達時間</label><input type="time" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg" /></div>
                                                            <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1">停留 (小時)</label><input type="number" step="0.5" min="0" value={newItem.stayTime} onChange={e => setNewItem({...newItem, stayTime: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg" /></div>
                                                        </div>
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">備註</label><textarea value={newItem.note} onChange={e => setNewItem({...newItem, note: e.target.value})} rows="3" className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg resize-none auto-extend" placeholder="備註..." /></div>
                                                        <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-4 shadow-lg transition-all">{panelMode === 'add' ? '完成新增' : '儲存修改'}</button>
                                                        {panelMode === 'edit' && (
                                                            <div className="flex gap-4 pt-6 border-t border-slate-800">
                                                                <label className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold text-center cursor-pointer border border-slate-600 flex justify-center items-center gap-2 text-sm shadow-sm"><Icons.Camera size={16} /> 更換圖片<input type="file" accept="image/*" className="hidden" onChange={e => handlePlaceImageUpload(activeDayId, newItem.id, e)} /></label>
                                                                <button type="button" onClick={() => { if(window.confirm("確定刪除？")) { const newDays = trip.days.map(d => d.id === activeDayId ? { ...d, places: d.places.filter(p => p.id !== newItem.id) } : d); pushUpdate({ trip: { ...trip, days: newDays } }); setPanelMode('list'); } }} className="px-4 py-2.5 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 rounded-xl font-bold border border-slate-600 flex items-center justify-center gap-2"><Icons.Trash2 size={16} /> 刪除</button>
                                                            </div>
                                                        )}
                                                    </form>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 relative hidden md:block">
                                    <RealMap places={activeDayData?.places || []} hoveredId={hoveredPlaceId} hoveredSegmentId={hoveredSegmentId} zoomControlKey={activeDayId} dayColor={activeDayData?.color} onRouteAltSelect={(pId, altIdx) => handleUpdateRouteIndex(activeDayData.id, pId, altIdx)} tempMarker={tempMarker} />
                                </div>
                            </>
                        )}
                        {/* (其餘 Expenses, Shopping, Packing 標籤內容保持不變) */}
                        {activeTab === 'expenses' && <div className="p-8 text-center text-slate-500">花費功能模組...</div>}
                        {activeTab === 'shopping' && <div className="p-8 text-center text-slate-500">待買功能模組...</div>}
                        {activeTab === 'packing' && <div className="p-8 text-center text-slate-500">行李功能模組...</div>}
                    </div>
                    {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl">刪除</button></div></div></div>)}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const appId = 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            useEffect(() => { window.FirebaseSDK.signInAnonymously(auth); return window.FirebaseSDK.onAuthStateChanged(auth, setUser); }, [auth]);
            useEffect(() => {
                if (!user) return;
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips');
                return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => {
                    const fetchedTrips = [];
                    snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); });
                    if (snapshot.empty) window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', 'trip_sz-macau'), INITIAL_TRIP_DATA);
                    setTrips(fetchedTrips.sort((a, b) => b.id.localeCompare(a.id)));
                });
            }, [user, db, appId]);
            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={() => {}} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={() => {}} onImportTrip={() => {}} onExportTrip={() => {}} toast={toast} />;
            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
