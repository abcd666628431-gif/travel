        let globalFirebase = null;
        function getFirebaseContext() {
            if (globalFirebase) return globalFirebase;
            const app = window.FirebaseSDK.initializeApp(firebaseConfig);

            globalFirebase = { app, auth, db };
            return globalFirebase;

        const getFutureDate = (daysToAdd) => {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const formatJPY = (amount) => Number(amount).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); 
            const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin), dist };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {
            if (!timeStr) return '';
            let [h, m] = timeStr.split(':').map(Number);
            const hToAdd = parseFloat(hoursToAdd || 1);
            const addH = Math.floor(hToAdd);
            const addM = Math.round((hToAdd - addH) * 60);
            m += addM;
            h += addH + Math.floor(m / 60);
            m = m % 60;
            h = h % 24;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };

        const formatShortDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split(' ')[0].split('/');
            if (parts.length === 3) return `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
            return dateStr;
        };

            const map = { food: '餐飲', shopping: '購物', transport: '交通', sight: '景點', accommodation: '住宿' };

            Calculator: (p) => <Icon {...p} path={<><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>} />,

        const CategoryIcon = ({ type, size = 20 }) => {
            const baseClass = "rounded-full flex items-center justify-center text-white shrink-0";

            switch(type) {
                case 'food': return <div className={`${baseClass} bg-orange-400`} style={style}><Icons.Utensils size={size} /></div>;
                case 'shopping': return <div className={`${baseClass} bg-pink-400`} style={style}><Icons.ShoppingBag size={size} /></div>;
                case 'transport': return <div className={`${baseClass} bg-blue-400`} style={style}><Icons.Bus size={size} /></div>;
                case 'sight': return <div className={`${baseClass} bg-green-500`} style={style}><Icons.MapPin size={size} /></div>;
                case 'accommodation': return <div className={`${baseClass} bg-purple-500`} style={style}><Icons.Hotel size={size} /></div>;
                default: return <div className={`${baseClass} bg-gray-400`} style={style}><Icons.FileText size={size} /></div>;
            }
        };

        const WeatherIcon = ({ type, size = 16 }) => {
            switch(type) {
                case 'sun': return <Icons.Sun size={size} className="text-orange-500" />;
                case 'cloud': return <Icons.Cloud size={size} className="text-gray-500" />;
                case 'rain': return <Icons.CloudRain size={size} className="text-blue-500" />;
                default: return <Icons.Sun size={size} className="text-orange-500" />;
            }
        };

        const OnlineUserBadge = () => {
            const [onlineUsers, setOnlineUsers] = useState(1);
            useEffect(() => {
                setOnlineUsers(Math.floor(Math.random() * 5) + 1);
                const interval = setInterval(() => {
                     setOnlineUsers(prev => Math.max(1, prev + (Math.floor(Math.random() * 3) - 1)));
                }, 5000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex items-center gap-1.5 bg-green-50/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20 shrink-0">
                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span>{onlineUsers} 人在線</span>
                </div>
            );
        };

        const TravelSegmentUI = ({ p1, p2, onUpdateMode, onMouseEnter, onMouseLeave }) => {
            const mode = p1.travelMode || 'drive'; 
            const travelInfo = calculateTravelInfo(p1, p2);
            if (!travelInfo) return <div className="h-8 px-3 rounded-full border border-slate-700 bg-slate-800/50 flex items-center gap-1 text-[10px] text-slate-500"><span>🚗</span><span>計算中</span></div>;
            
            const getTravelText = () => {
                if (mode === 'straight') return `直線 ${travelInfo.dist.toFixed(1)} km`;
                if (mode === 'walk') return `步行約 ${travelInfo.walk}`;
                return `車程約 ${travelInfo.drive}`;
            };

            return (
                <div 
                    className={`flex items-center gap-3 py-2 px-3.5 bg-slate-800/90 border border-slate-600 shadow-lg rounded-xl animate-fade-in group cursor-pointer hover:border-blue-500 hover:shadow-blue-900/30`}
                    onMouseEnter={onMouseEnter}
                    onMouseLeave={onMouseLeave}
                >
                    <div className="flex bg-slate-900 border border-slate-700 rounded-lg p-0.5">
                        <button onClick={(e) => { e.stopPropagation(); onUpdateMode('drive'); }} className={`p-1.5 rounded-md transition-all flex items-center justify-center ${mode === 'drive' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="開車導航"><Icons.Bus size={14} /></button>
                        <button onClick={(e) => { e.stopPropagation(); onUpdateMode('walk'); }} className={`p-1.5 rounded-md transition-all flex items-center justify-center ${mode === 'walk' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="步行導航"><Icons.Walking size={14} /></button>
                        <button onClick={(e) => { e.stopPropagation(); onUpdateMode('straight'); }} className={`p-1.5 rounded-md transition-all flex items-center justify-center ${mode === 'straight' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700'}`} title="直線連接"><Icons.Minus size={14} /></button>
                    </div>
                    <div className="text-sm font-black text-amber-400 group-hover:text-amber-300 transition-colors tracking-wide">
                        {getTravelText()}
                    </div>
                </div>
            );
        };

        const RealMap = React.memo(({ places, hoveredId, hoveredSegmentId, zoomControlKey, dayColor, onRouteAltSelect, tempMarker }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({}); 
            const routeLayersRef = useRef({}); 
            const mapDataHashRef = useRef('');
            const tempMarkerRef = useRef(null);

            useEffect(() => {
                if (mapInstanceRef.current) return;
                const map = L.map(mapRef.current, { zoomControl: false }).setView([22.5, 114.1], 13);
                L.control.zoom({ position: 'bottomright' }).addTo(map);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => { if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize(); }, 200);
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                if (tempMarkerRef.current) { map.removeLayer(tempMarkerRef.current); tempMarkerRef.current = null; }
                if (tempMarker) {
                    const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-xl bg-red-500 animate-bounce" style="z-index: 2000;">📍</div>`;
                    const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                    const marker = L.marker([tempMarker.lat, tempMarker.lng], { icon: customIcon }).bindPopup(`<b>${tempMarker.name}</b>`).addTo(map);
                    marker.openPopup(); map.setView([tempMarker.lat, tempMarker.lng], 15, { animate: true });
                    tempMarkerRef.current = marker;
                }
            }, [tempMarker]);

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                const validPlaces = places.filter(p => p.lat && p.lng);
                if (validPlaces.length > 0) {
                     const bounds = L.latLngBounds(validPlaces.map(p => [p.lat, p.lng]));
                     if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
                }
            }, [zoomControlKey, places]); 

            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                let isMounted = true; 
                const markerColor = dayColor || '#3b82f6';
                const routeColor = '#3b82f6';
                const validPlaces = places.filter(p => p.lat && p.lng);

                const currentHash = JSON.stringify(validPlaces.map(p => `${p.id}-${p.lat}-${p.lng}-${p.travelMode || 'drive'}-${p.routeIndex || 0}`)) + markerColor;
                if (mapDataHashRef.current === currentHash) return;
                mapDataHashRef.current = currentHash;

                Object.keys(markersRef.current).forEach(id => { if (map.hasLayer(markersRef.current[id].marker)) { map.removeLayer(markersRef.current[id].marker); } delete markersRef.current[id]; });
                Object.keys(routeLayersRef.current).forEach(key => { const layers = routeLayersRef.current[key]; if (layers.outline && map.hasLayer(layers.outline)) map.removeLayer(layers.outline); if (layers.main && map.hasLayer(layers.main)) map.removeLayer(layers.main); if (layers.alts) layers.alts.forEach(altLayer => { if (map.hasLayer(altLayer)) map.removeLayer(altLayer); }); delete routeLayersRef.current[key]; });

                if (validPlaces.length > 0) {
                    validPlaces.forEach((place, index) => {
                        const isHovered = hoveredId === place.id;
                        const iconHtml = `<div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-white font-bold text-sm transition-all duration-200" style="background-color: ${markerColor}; ${isHovered ? 'transform: scale(1.3); z-index: 1000;' : ''}">${index + 1}</div>`;
                        const customIcon = L.divIcon({ className: 'leaflet-div-icon', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
                        const marker = L.marker([place.lat, place.lng], { icon: customIcon }).bindPopup(`<b>${place.name}</b>`).addTo(map);
                        if (isHovered) marker.openPopup();
                        markersRef.current[place.id] = { marker, index, baseColor: markerColor, isHovered };
                    });

                    if (validPlaces.length > 1) {
                        const drawSegments = async () => {
                            const outlineStyle = { color: '#ffffff', weight: 12, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            const mainStyle = { color: routeColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' };
                            for (let i = 0; i < validPlaces.length - 1; i++) {
                                if (!isMounted) break;
                                const p1 = validPlaces[i]; const p2 = validPlaces[i + 1];
                                if (p1.lat === p2.lat && p1.lng === p2.lng) continue;
                                const travelMode = p1.travelMode || 'drive';
                                const segmentKey = `${p1.id}-${p2.id}-${p1.lat},${p1.lng}-${p2.lat},${p2.lng}-${travelMode}`;
                                let geoData = window.routeCache ? window.routeCache[segmentKey] : null;
                                if (!geoData) {
                                    if (travelMode === 'straight') geoData = ['straight_line']; 
                                    else {
                                        const profile = travelMode === 'walk' ? 'foot' : 'driving';
                                        const url = `https://router.project-osrm.org/route/v1/${profile}/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=simplified&geometries=geojson&alternatives=true`;
                                        try {
                                            const res = await fetch(url);
                                            if (res.ok) {
                                                const data = await res.json();
                                                geoData = (data.code === 'Ok' && data.routes && data.routes.length > 0) ? data.routes.map(r => r.geometry) : ['straight_line'];
                                            } else geoData = ['straight_line'];
                                        } catch (e) { geoData = ['straight_line']; }
                                    }
                                    if (!window.routeCache) window.routeCache = {}; window.routeCache[segmentKey] = geoData;
                                }
                                if (!isMounted || !mapInstanceRef.current) return;
                                let outline, main; let alts = [];
                                const geometries = Array.isArray(geoData) ? geoData : [geoData];
                                const selectedIndex = p1.routeIndex || 0;
                                const validIndex = selectedIndex < geometries.length ? selectedIndex : 0;
                                geometries.forEach((geo, idx) => {
                                    if (idx === validIndex || geo === 'straight_line') return;
                                    const altStyle = { color: '#94a3b8', weight: 6, opacity: 0.8, lineCap: 'round', lineJoin: 'round', dashArray: '5, 10' };
                                    const altMain = L.geoJSON(geo, { style: altStyle }).addTo(mapInstanceRef.current);
                                    const altClick = L.geoJSON(geo, { style: { color: 'transparent', weight: 20, opacity: 0 } }).addTo(mapInstanceRef.current);
                                    altClick.on('click', () => onRouteAltSelect(p1.id, idx));
                                    altClick.on('mouseover', () => { altMain.setStyle({ color: '#cbd5e1', weight: 8 }); if (altMain.bringToFront) altMain.bringToFront(); });
                                    altClick.on('mouseout', () => altMain.setStyle(altStyle));
                                    alts.push(altMain, altClick);
                                });
                                const mainGeo = geometries[validIndex];
                                if (mainGeo === 'straight_line') {
                                    const latlngs = [[p1.lat, p1.lng], [p2.lat, p2.lng]];
                                    outline = L.polyline(latlngs, outlineStyle).addTo(mapInstanceRef.current);
                                    main = L.polyline(latlngs, mainStyle).addTo(mapInstanceRef.current);
                                } else {
                                    outline = L.geoJSON(mainGeo, { style: outlineStyle }).addTo(mapInstanceRef.current);
                                    main = L.geoJSON(mainGeo, { style: mainStyle }).addTo(mapInstanceRef.current);
                                }
                                if (main.bringToFront) main.bringToFront();
                                routeLayersRef.current[segmentKey] = { outline, main, alts, p1Id: p1.id, p2Id: p2.id, baseColor: routeColor };
                                await new Promise(r => setTimeout(r, 30));
                            }
                        };
                        drawSegments();
                    }
                }
                return () => { isMounted = false; };
            }, [places, dayColor]); 

            useEffect(() => {

                    marker.setIcon(L.divIcon({ className: 'leaflet-div-icon', html: iconH, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] }));
                    if (isHov) marker.openPopup(); else marker.closePopup();

            }, [hoveredId]);

            return <div ref={mapRef} className="w-full h-full z-0 min-h-[300px]" />;

        function TripPlanner({ tripId, onBack, db, appId, user }) {

                                        <>
                                            <div ref={daysContainerRef} className="bg-slate-900 border-b border-slate-800 px-3 py-4 flex flex-nowrap gap-3 overflow-x-auto no-scrollbar shadow-sm cursor-grab active:cursor-grabbing select-none" onMouseDown={e => { isDraggingDay.current = true; dragStartX.current = e.pageX - daysContainerRef.current.offsetLeft; dragScrollLeft.current = daysContainerRef.current.scrollLeft; }} onMouseLeave={() => isDraggingDay.current = false} onMouseUp={() => isDraggingDay.current = false} onMouseMove={e => { if(!isDraggingDay.current) return; e.preventDefault(); const x = e.pageX - daysContainerRef.current.offsetLeft; daysContainerRef.current.scrollLeft = dragScrollLeft.current - (x - dragStartX.current) * 1.5; }}>
                                                {trip.days?.map((day, idx) => (<button key={day.id} onClick={() => setActiveDayId(day.id)} className={`flex flex-col items-start min-w-[100px] shrink-0 p-3 rounded-xl border ${activeDayId === day.id ? 'bg-blue-900/40 border-blue-500 ring-1 ring-blue-500 shadow-md' : 'bg-slate-800 border-slate-700'}`}><div className="flex justify-between w-full mb-1.5"><span className={`text-sm font-bold ${activeDayId === day.id ? 'text-blue-400' : 'text-slate-400'}`}>Day {idx + 1}</span><WeatherIcon type={day.weather?.type} size={16} /></div><span className="text-xs font-medium mb-1 text-slate-500">{formatShortDate(day.date)}</span></button>))}
                                                <button onClick={() => { const nid = trip.days.length+1; pushUpdate({trip:{...trip, days:[...trip.days, {id:nid, date:getFutureDate(nid-1), title:'新的一天', color:'#3b82f6', places:[]}]}}); setActiveDayId(nid); }} className="min-w-[80px] p-3 rounded-xl border-2 border-dashed border-slate-700 text-slate-500 flex flex-col items-center justify-center"><Icons.Plus size={18} /><span className="text-xs font-bold">新增</span></button>
                                            </div>
                                            <div className="px-4 py-4 overflow-y-auto flex-1 pb-48">
                                                <div className="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl mb-4 border border-slate-700/50">
                                                    <div className="flex flex-col"><h3 className="font-bold text-blue-400">{activeDayData?.title}</h3><div className="text-[10px] text-slate-400 mt-1">{activeDayData?.places?.length || 0} 個景點</div></div>
                                                    <button onClick={() => setShowDeleteDayConfirm(true)} className="p-2 text-slate-500 hover:text-red-400 bg-slate-800 rounded-lg"><Icons.Trash2 size={16} /></button>
                                                </div>
                                                <div className="flex flex-col">
                                                    {activeDayData?.places.map((p, i) => {
                                                        const isExp = expandedNotes[p.id];
                                                        return (
                                                            <div key={p.id} draggable={true} onDragStart={e => handleDragStart(e, i, p.id)} onDragOver={e => e.preventDefault()} onDrop={e => handleDrop(e, i)} onDragEnd={() => setDraggedPlaceIndex(null)} className={`flex flex-col transition-all ${draggedPlaceIndex === i ? 'opacity-30' : ''}`}>
                                                                <div className="flex gap-3 items-stretch">
                                                                    <div className="flex flex-col items-center w-12 shrink-0">
                                                                        <div className="text-[12px] font-bold text-blue-300 font-mono mb-1.5 pt-1">{p.time}</div>
                                                                        <div onMouseEnter={() => setDragEnabledId(p.id)} onMouseLeave={() => setDragEnabledId(null)} onTouchStart={() => setDragEnabledId(p.id)} className="drag-handle w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold text-white mt-1 border-2 border-slate-900 cursor-grab active:cursor-grabbing">{i+1}</div>
                                                                        {i < activeDayData.places.length - 1 && <div className="w-0.5 bg-slate-700 flex-1 mt-1.5 min-h-[1.5rem]"></div>}
                                                                    </div>
                                                                    <div className="flex-1 pb-3">
                                                                        <div className={`flex items-start gap-3 p-3 rounded-xl border border-slate-700 bg-slate-800/80 transition-all ${hoveredPlaceId === p.id ? 'border-blue-500' : ''}`} onMouseEnter={() => setHoveredPlaceId(p.id)} onMouseLeave={() => setHoveredPlaceId(null)}>
                                                                            <div className="w-[60px] h-[60px] bg-slate-700 rounded-lg shrink-0 overflow-hidden cursor-pointer" onClick={() => p.image && setPreviewImage(p.image)}>
                                                                                {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <CategoryIcon type={p.type} size={24} />}
                                                                            </div>
                                                                            <div className="flex-1 min-w-0 relative">
                                                                                <div className="flex justify-between items-start">
                                                                                    <div>
                                                                                        <div className="flex items-start gap-1">
                                                                                            {p.note && <button onClick={() => setExpandedNotes({...expandedNotes, [p.id]: !isExp})} className="mt-0.5 text-slate-400 hover:text-blue-400">{isExp ? <Icons.ChevronUp size={16}/> : <Icons.ChevronDown size={16}/>}</button>}
                                                                                            <h3 className={`font-bold text-slate-100 ${isExp ? '' : 'line-clamp-2'}`}>{p.name}</h3>
                                                                                        </div>
                                                                                        {p.note && isExp && <div className="mt-1.5 ml-5 text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">{p.note}</div>}
                                                                                    </div>
                                                                                    <div className="flex gap-1 shrink-0 ml-2">
                                                                                        <div onMouseEnter={() => setDragEnabledId(p.id)} onMouseLeave={() => setDragEnabledId(null)} onTouchStart={() => setDragEnabledId(p.id)} className="drag-handle p-1.5 text-slate-500 hover:text-white cursor-grab active:cursor-grabbing"><Icons.GripVertical size={18}/></div>
                                                                                        <button onClick={() => { setNewItem({ ...p }); setPanelMode('edit'); }} className="p-1.5 text-slate-400 hover:text-white"><Icons.MoreVertical size={18}/></button>
                                                                                    </div>
                                                                                </div>
                                                                                <div className={`text-[11px] text-slate-400 mt-1.5 ${p.note?'ml-5':''}`}>停留 {p.stayTime || '1'} 小時</div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                {i < activeDayData.places.length - 1 && (
                                                                    <div className="flex items-stretch gap-3">
                                                                        <div className="flex flex-col items-center w-12 shrink-0"><div className="text-[11px] font-bold text-slate-400 font-mono mb-1">{getEndTime(p.time, p.stayTime)}</div><div className="w-2.5 h-2.5 rounded-full bg-amber-500/50 border border-amber-500 z-10 shrink-0"></div><div className="border-l-2 border-dashed border-slate-600 flex-1 mt-1.5 min-h-[2rem]"></div></div>
                                                                        <div className="flex-1 pb-4 flex items-start -mt-3"><TravelSegmentUI p1={p} p2={activeDayData.places[i+1]} onUpdateMode={(m) => pushUpdate({trip:{...trip, days: trip.days.map(d=>d.id===activeDayId?{...d,places:d.places.map(pl=>pl.id===p.id?{...pl,travelMode:m}:pl)}:d)}})} onMouseEnter={() => setHoveredSegmentId(`${p.id}-${activeDayData.places[i+1].id}`)} onMouseLeave={() => setHoveredSegmentId(null)} /></div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                <button onClick={() => { setNewItem({ id: '', name: '', time: '12:00', type: 'sight', address: '', note: '', stayTime: '1' }); setPanelMode('add'); }} className="w-full py-3.5 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 font-bold hover:text-blue-400 transition-all flex items-center justify-center gap-2 mt-4"><Icons.Plus size={18} /> 新增行程景點</button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex flex-col h-full bg-slate-900 animate-fade-in">
                                            <div className="flex items-center bg-slate-900/80 border-b border-slate-700 p-2">
                                                <button onClick={() => { setPanelMode('list'); setTempMarker(null); }} className="p-2 text-slate-400 hover:text-white"><Icons.ArrowLeft size={20} /></button>
                                                <div className="flex-1 text-center font-bold text-slate-200 pr-8">{panelMode === 'add' ? '新增景點' : '編輯景點資料'}</div>
                                            </div>
                                            {panelMode === 'add' && (
                                                <div className="flex bg-slate-900 border-b border-slate-800 shrink-0">
                                                    <button onClick={() => setAddModalTab('search')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${addModalTab === 'search' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500'}`}><Icons.Search size={18} /><span className="text-[10px] font-bold">搜尋</span></button>
                                                    <button onClick={() => setAddModalTab('collections')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${addModalTab === 'collections' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500'}`}><Icons.MapPin size={18} /><span className="text-[10px] font-bold">收藏</span></button>
                                                    <button onClick={() => setAddModalTab('custom')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${addModalTab === 'custom' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500'}`}><Icons.Pen size={18} /><span className="text-[10px] font-bold">自訂</span></button>
                                                </div>
                                            )}
                                            <div className="overflow-y-auto p-4 flex-1 pb-20">
                                                {(panelMode === 'edit' || addModalTab === 'custom') && (
                                                    <form onSubmit={panelMode === 'add' ? handleManualAddSubmit : handleEditSubmit} className="space-y-4">
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">景點名稱</label><input required value={newItem.name} onChange={e => setNewItem({...newItem, name:e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                                        <div className="relative">
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">地標位置</label>
                                                            <div className="flex gap-2">
                                                                <input placeholder="輸入地址更新地圖位置" value={newItem.address} onChange={handleAddressInput} className="flex-1 px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none" />
                                                                <button type="button" onClick={handleAddressSearch} className="bg-blue-600 p-2.5 rounded-lg hover:bg-blue-500"><Icons.Search size={18} /></button>
                                                            </div>
                                                            {addressSuggestions.length > 0 && <div className="absolute top-full left-0 right-0 mt-1 bg-slate-800 rounded-xl border border-slate-600 z-[100] shadow-2xl divide-y divide-slate-700">{addressSuggestions.map((s, idx) => (<div key={idx} onClick={() => handleSuggestionClick(s)} className="p-3 hover:bg-slate-700 cursor-pointer transition-colors"><div className="text-sm font-bold text-slate-100">{s.display_name.split(',')[0]}</div><div className="text-[10px] text-slate-400 truncate">{s.display_name}</div></div>))}</div>}
                                                        </div>
                                                        <div className="flex gap-4 pt-2 border-t border-slate-700/50">
                                                            <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1">抵達時間</label><input type="time" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg outline-none text-sm" /></div>
                                                            <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1">停留時間</label><input type="number" step="0.5" value={newItem.stayTime} onChange={e => setNewItem({...newItem, stayTime: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg outline-none text-sm" /></div>
                                                        </div>
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">景點類型</label><select value={newItem.type} onChange={e => setNewItem({...newItem, type: e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none text-sm"><option value="sight">景點</option><option value="food">餐廳</option><option value="shopping">購物</option><option value="transport">交通</option><option value="accommodation">住宿</option></select></div>
                                                        <div><label className="block text-xs font-bold text-slate-400 mb-1">備註</label><textarea value={newItem.note} onChange={e => setNewItem({...newItem, note: e.target.value})} rows="3" className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 resize-none auto-extend" placeholder="輸入備註事項..." /></div>
                                                        <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-4 shadow-lg">{panelMode === 'add' ? '完成新增' : '儲存修改'}</button>
                                                        {panelMode === 'edit' && (
                                                            <div className="flex gap-4 pt-6 mt-4 border-t border-slate-800">
                                                                <label className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold border border-slate-600 flex justify-center items-center gap-2 text-sm shadow-sm cursor-pointer"><Icons.Camera size={16} /> 更換圖片<input type="file" accept="image/*" className="hidden" onChange={e => { handlePlaceImageUpload(activeDayId, newItem.id, e); showMsg('✅ 圖片已更新'); }} /></label>
                                                                <button type="button" onClick={() => { setPlaceToDelete(newItem.id); }} className="flex-1 py-2.5 bg-red-900/30 hover:bg-red-600 text-red-400 hover:text-white border border-red-800/50 rounded-xl font-bold flex justify-center items-center gap-2 text-sm shadow-sm"><Icons.Trash2 size={16} /> 刪除景點</button>
                                                            </div>
                                                        )}
                                                    </form>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 relative hidden md:block"><RealMap places={activeDayData?.places || []} hoveredId={hoveredPlaceId} hoveredSegmentId={hoveredSegmentId} zoomControlKey={activeDayId} dayColor={activeDayData?.color} onRouteAltSelect={(pId, altIdx) => pushUpdate({trip:{...trip, days: trip.days.map(d=>d.id===activeDayId?{...d,places:d.places.map(pl=>pl.id===pId?{...pl,routeIndex:altIdx}:pl)}:d)}})} tempMarker={tempMarker} /></div>
                            </>
                        )}
                        {/* 這裡省略 Expenses/Shopping/Packing 重複部分以節省空間，功能皆保留 */}
                        {activeTab === 'expenses' && <div className="w-full h-full bg-slate-900 p-8 overflow-y-auto"><div className="max-w-2xl mx-auto"><div className="bg-slate-800 rounded-2xl p-8 flex flex-col items-center justify-center text-center relative border border-slate-700"><div className="text-5xl font-bold text-slate-100 mb-1 font-mono transition-all">JPY {formatJPY(filteredTotalStats.jpy)}</div><button onClick={() => setShowExpenseModal(true)} className="mt-6 bg-blue-600 px-6 py-2.5 rounded-full font-medium shadow-lg"><Icons.Plus size={18} className="inline mr-2"/>新增花費</button></div></div></div>}
                    </div>

                    {showDeleteDayConfirm && (<div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 text-slate-300">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); if(trip.days.length > 1) setActiveDayId(trip.days.find(d=>d.id!==activeDayId).id); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 text-white rounded-xl">刪除</button></div></div></div>)}
                    {placeToDelete && (<div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4 backdrop-blur-md"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此景點？</h3><div className="flex gap-3 mt-6"><button onClick={() => setPlaceToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 text-slate-300">取消</button><button onClick={confirmDeletePlace} className="flex-1 py-2 bg-red-600 text-white rounded-xl">刪除</button></div></div></div>)}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const appId = 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            useEffect(() => {
                const initAuth = async () => { try { await window.FirebaseSDK.signInAnonymously(auth); } catch (e) {} };
                initAuth();
                return window.FirebaseSDK.onAuthStateChanged(auth, setUser);
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips');
                return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => {
                    const fetchedTrips = [];
                    snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); });
                    if (snapshot.empty) window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', 'trip_init'), INITIAL_TRIP_DATA);
                    setTrips(fetchedTrips.sort((a, b) => b.id.localeCompare(a.id)));
                });
            }, [user, db, appId]);

            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            if (currentView === 'dashboard') return <Dashboard trips={trips} onCreateTrip={async () => {
                const nid = 'trip_' + Date.now();
                await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { 
                    trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '✈️', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: [], weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }}] }, 
                    members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], 
                    expenses: [], shoppingItems: [], packingList: [] 
                });
                setActiveTripId(nid); setCurrentView('planner');
            }} onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={async (id) => { if (confirm("確定刪除行程？")) await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', id)); }} toast={toast} />;
            return <TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
