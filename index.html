            Briefcase: (p) => <Icon {...p} path={<><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />,
            Search: (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
            Move: (p) => <Icon {...p} path={<><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></>} />,
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            databaseURL: "https://icarus2-50e01-default-rtdb.firebaseio.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };

        let globalFirebase = null;
        function getFirebaseContext() {
            if (globalFirebase) return globalFirebase;
            const app = window.FirebaseSDK.initializeApp(firebaseConfig);
            const auth = window.FirebaseSDK.getAuth(app);
            let db;
            try {
                db = window.FirebaseSDK.initializeFirestore(app, {
                    localCache: window.FirebaseSDK.persistentLocalCache({
                        tabManager: window.FirebaseSDK.persistentMultipleTabManager()
                    })
                });
            } catch (e) {
                db = window.FirebaseSDK.getFirestore(app);
            }
            globalFirebase = { app, auth, db };
            return globalFirebase;
        }

        const getFutureDate = (daysToAdd) => {
            const date = new Date(); date.setDate(date.getDate() + daysToAdd);
            const mm = date.getMonth() + 1; const dd = date.getDate();
            const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][date.getDay()];
            return `${date.getFullYear()}/${mm}/${dd} (${dayOfWeek})`;
        };

        const formatNumber = (amount, decimals = 0) => Number(amount || 0).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        const deg2rad = (deg) => deg * (Math.PI / 180);

        const PI = Math.PI; const a = 6378245.0; const ee = 0.00669342162296594323;
        const transformLat = (x, y) => {
            let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0; return ret;
        };
        const transformLng = (x, y) => {
            let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0; return ret;
        };
        
        const getDistanceFromLatLonInKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371; const dLat = deg2rad(lat2 - lat1); const dLon = deg2rad(lon2 - lon1);
            const a_val = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a_val), Math.sqrt(1 - a_val));
        };

        const gcj02towgs84 = (lng, lat) => {
            let dlat = transformLat(lng - 105.0, lat - 35.0); let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI; let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic; let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            return [lng * 2 - (lng + dlng), lat * 2 - (lat + dlat)];
        };

        const wgs84togcj02 = (lng, lat) => {
            if (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lng, lat];
            let dlat = transformLat(lng - 105.0, lat - 35.0); let dlng = transformLng(lng - 105.0, lat - 35.0);
            let radlat = lat / 180.0 * PI; let magic = Math.sin(radlat);
            magic = 1 - ee * magic * magic; let sqrtmagic = Math.sqrt(magic);
            dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
            dlng = (dlng * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
            return [lng + dlng, lat + dlat];
        };

        const calculateTravelInfo = (p1, p2) => {
            if (!p1 || !p2 || !p1.lat || !p1.lng || !p2.lat || !p2.lng) return null;
            const dist = getDistanceFromLatLonInKm(p1.lat, p1.lng, p2.lat, p2.lng);
            const walkMin = Math.round((dist / 5) * 60); const driveMin = Math.round((dist / 30) * 60) + 5; 
            const format = (m) => m > 60 ? `${Math.floor(m/60)}小時${m%60}分` : `${m}分`;
            return { walk: format(walkMin), drive: format(driveMin), dist, walkMin, driveMin };
        };

        const getEndTime = (timeStr, hoursToAdd = 1) => {
            if (!timeStr) return '';
            let [h, m] = timeStr.split(':').map(Number);
            const addH = Math.floor(hoursToAdd); const addM = Math.round((hoursToAdd - addH) * 60);
            m += addM; h += addH + Math.floor(m / 60); m = m % 60; h = h % 24;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        };

        const formatShortDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split(' ')[0].split('/');
            return parts.length === 3 ? `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}` : dateStr;
        };

        const getCategoryName = (type) => {
            const map = { food: '餐飲', shopping: '購物', transport: '交通', sight: '景點', accommodation: '住宿' }; return map[type] || '其他';
        };

        const CategoryIconWithLabel = ({ type, size = 20 }) => {
            const baseClass = "rounded-full flex items-center justify-center shrink-0 shadow-sm";
            const style = { width: `${size*2}px`, height: `${size*2}px`, fontSize: `${size * 1.2}px` };
            switch(type) {
                case 'food': return <div className={`${baseClass} bg-orange-400/20 border border-orange-500/50`} style={style}>🍽️</div>;
                case 'shopping': return <div className={`${baseClass} bg-pink-400/20 border border-pink-500/50`} style={style}>🛍️</div>;
                case 'transport': return <div className={`${baseClass} bg-blue-400/20 border border-blue-500/50`} style={style}>🚌</div>;
                case 'sight': return <div className={`${baseClass} bg-green-500/20 border border-green-500/50`} style={style}>📸</div>;
                case 'accommodation': return <div className={`${baseClass} bg-purple-500/20 border border-purple-500/50`} style={style}>🏨</div>;
                default: return <div className={`${baseClass} bg-gray-400/20 border border-gray-500/50`} style={style}>📝</div>;
            }
        };

        const WeatherIcon = ({ type, size = 16 }) => {
            const style = { fontSize: `${size}px`, lineHeight: 1 };
            switch(type) {
                case 'sun': return <span style={style} title="晴天">☀️</span>;
                case 'cloud': return <span style={style} title="多雲">☁️</span>;
                case 'rain': return <span style={style} title="雨天">🌧️</span>;
                default: return <span style={style} title="晴天">☀️</span>;
            }
        };

        const OnlineUserBadge = () => {
            const [onlineUsers, setOnlineUsers] = useState(1);
            useEffect(() => {
                setOnlineUsers(Math.floor(Math.random() * 5) + 1);
                const interval = setInterval(() => { setOnlineUsers(prev => Math.max(1, prev + (Math.floor(Math.random() * 3) - 1))); }, 5000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex items-center gap-1.5 bg-green-50/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20 shrink-0">
                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span className="hidden sm:inline">{onlineUsers} 人在線</span><span className="sm:hidden">{onlineUsers}</span>
                </div>
            );
        };

        const TravelSegmentUI = ({ p1, p2, onUpdateMode, onMouseEnter, onMouseLeave, onTouchStart }) => {
            const mode = p1.travelMode || 'drive'; const travelInfo = calculateTravelInfo(p1, p2);
            if (!travelInfo) return <div className="h-8 px-3 rounded-full border border-slate-700 bg-slate-800/50 flex items-center gap-1 text-[10px] text-slate-500"><span>🚗</span><span>計算中</span></div>;
            const getTravelText = () => {
                if (mode === 'straight') return `直線 ${travelInfo.dist.toFixed(1)} km`;
                if (mode === 'walk') return `步行約 ${travelInfo.walk}`;
                return `車程約 ${travelInfo.drive}`;
            };
            return (

                                <form onSubmit={handleAddExpenseSubmit} className="p-6 space-y-4 overflow-y-auto">
                                    <div><label className="block text-sm font-bold text-slate-400 mb-1">名稱</label><input required value={newExpenseItem.title} onChange={e => setNewExpenseItem({...newExpenseItem, title: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                    <div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">日期</label><input required type="date" value={newExpenseItem.date} onChange={e => setNewExpenseItem({...newExpenseItem, date: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">類別</label><select value={newExpenseItem.category} onChange={e => setNewExpenseItem({...newExpenseItem, category: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="food">餐飲</option><option value="shopping">購物</option><option value="transport">交通</option><option value="sight">景點</option><option value="accommodation">住宿</option><option value="other">其他</option></select></div></div>
                                    <div className="flex gap-4"><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">金額</label><input required type="number" step="0.01" value={newExpenseItem.amount} onChange={e => setNewExpenseItem({...newExpenseItem, amount: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="w-24"><label className="block text-sm font-bold text-slate-400 mb-1">幣別</label><select value={newExpenseItem.currency} onChange={e => setNewExpenseItem({...newExpenseItem, currency: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="JPY">JPY</option><option value="HKD">HKD</option><option value="TWD">TWD</option><option value="MOP">MOP</option><option value="CNY">CNY</option></select></div></div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">付款人</label><select value={newExpenseItem.payer} onChange={e => setNewExpenseItem({...newExpenseItem, payer: e.target.value})} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg">{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">分攤成員</label><div className="flex flex-wrap gap-2">{members.map(m => { const isChecked = newExpenseItem.sharedBy.includes(m.name); return (<button key={m.id} type="button" onClick={() => toggleSharedMember(m.name)} className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all border flex items-center gap-1 ${isChecked ? 'bg-blue-900/40 text-blue-400 border-blue-500/50' : 'bg-slate-800 text-slate-500 border-slate-700'}`}>{isChecked ? '✓ ' : ''}{m.avatar?.startsWith('data:image') ? <img src={m.avatar} className="w-full h-full object-cover" /> : m.avatar} {m.name}</button>); })}</div></div>
                                    <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-2 shadow-lg">{newExpenseItem.id ? '儲存修改' : '確認新增'}</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showShoppingModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">新增待買項目</h3><button onClick={() => setShowShoppingModal(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div>
                                <form onSubmit={handleAddShoppingSubmit} className="p-6 space-y-4">
                                    <div><label className="block text-sm font-bold text-slate-400 mb-1">品名</label><input required value={newShoppingItem.name} onChange={e => setNewShoppingItem({...newShoppingItem, name: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div>
                                    <div className="flex gap-4"><div className="w-20"><label className="block text-sm font-bold text-slate-400 mb-1">數量</label><input type="number" min="1" value={newShoppingItem.qty} onChange={e => setNewShoppingItem({...newShoppingItem, qty: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="flex-1"><label className="block text-sm font-bold text-slate-400 mb-1">單價</label><input required type="number" step="0.01" min="0" value={newShoppingItem.price} onChange={e => setNewShoppingItem({...newShoppingItem, price: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none" /></div><div className="w-24"><label className="block text-sm font-bold text-slate-400 mb-1">幣別</label><select value={newShoppingItem.currency} onChange={e => setNewShoppingItem({...newShoppingItem, currency: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none"><option value="JPY">JPY</option><option value="HKD">HKD</option><option value="TWD">TWD</option><option value="MOP">MOP</option><option value="CNY">CNY</option></select></div></div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700"><label className="block text-sm font-bold text-slate-300 mb-2">訂購人</label><select value={newShoppingItem.requester} onChange={e => setNewShoppingItem({...newShoppingItem, requester: e.target.value})} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg">{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div>
                                    <button type="submit" className="w-full py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-bold mt-2 shadow-lg">確認新增</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPackingModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700">
                                <div className="p-4 border-b border-slate-700 flex justify-between bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">新增行李項目</h3><button onClick={() => setShowPackingModal(false)}><Icons.X size={20} className="text-slate-500 hover:text-white transition-colors" /></button></div>
                                <form onSubmit={handleAddPacking} className="p-6 space-y-4">
                                    <div><label className="block text-sm font-bold text-slate-400 mb-1">物品名稱</label><input required placeholder="例如: 護照" value={newPackingItem.text} onChange={e => setNewPackingItem({...newPackingItem, text: e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-slate-100"/></div>
                                    <div><label className="block text-sm font-bold text-slate-400 mb-1">所屬成員</label><select value={newPackingItem.owner} onChange={e => setNewPackingItem({...newPackingItem, owner: e.target.value})} className="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 text-slate-100 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"><option value="all">👥 全體成員</option>{members.map(m => (<option key={m.id} value={m.name}>{m.name}</option>))}</select></div>
                                    <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold mt-2 shadow-lg transition-colors">新增</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showCopyPackingModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700 overflow-hidden">
                                <div className="p-4 border-b border-slate-700 flex justify-between bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100">複製行李項目</h3><button onClick={() => setShowCopyPackingModal(null)}><Icons.X size={20} className="text-slate-500 hover:text-white" /></button></div>
                                <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
                                    <p className="text-sm text-slate-300 bg-slate-900 p-3 rounded-lg border border-slate-700">準備複製：<strong className="text-white ml-1">{showCopyPackingModal.text}</strong></p>
                                    <p className="text-xs font-bold text-slate-400 mt-4 mb-2">請選擇目標對象：</p>
                                    <div className="space-y-2">
                                        <button onClick={() => handleCopyPackingAction(showCopyPackingModal, 'all')} className="w-full p-3 rounded-xl border border-slate-600 bg-blue-900/20 hover:bg-blue-900/40 hover:border-blue-500 text-left flex items-center gap-3 transition-colors"><div className="w-8 h-8 rounded-lg flex items-center justify-center text-white bg-slate-600 shadow-inner"><Icons.Users size={16}/></div><span className="font-bold text-blue-300">全體成員 (排除本人)</span></button>
                                        <div className="my-2 border-t border-slate-700 w-full h-1"></div>
                                        {members.filter(m => m.name !== showCopyPackingModal.owner).map(m => (<button key={m.id} onClick={() => handleCopyPackingAction(showCopyPackingModal, m.name)} className="w-full p-3 rounded-xl border border-slate-600 bg-slate-900/50 hover:bg-slate-700 hover:border-blue-500 text-left flex items-center gap-3 transition-colors"><div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white shadow-inner overflow-hidden ${m.avatar?.startsWith('data:image') ? 'bg-slate-800' : m.color}`}>{m.avatar?.startsWith('data:image') ? <img src={m.avatar} className="w-full h-full object-cover" /> : m.avatar}</div><span className="font-bold text-slate-200">{m.name}</span></button>))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettlementPlan && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-700">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100 flex items-center gap-2"><Icons.Calculator size={20} className="text-blue-400"/>結算方案</h3><button onClick={() => setShowSettlementPlan(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div>
                                <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                                    <div className="bg-blue-900/20 rounded-xl p-4 border border-blue-800/30">
                                        <h4 className="text-sm font-bold text-blue-400 mb-2">建議轉帳 ({displayCurrency})</h4>
                                        <div className="space-y-2">{settlementResult.transactions.length > 0 ? settlementResult.transactions.map((t, idx) => (<div key={idx} className="bg-slate-900/50 p-3 rounded-lg border border-slate-700 flex items-center justify-between"><div className="text-sm text-slate-300">{t.from} ➔ {t.to}</div><div className="text-blue-400 font-bold">{displayCurrency} {formatNumber(t.amount, displayCurrency === 'JPY' ? 0 : 1)}</div></div>)) : <div className="text-center text-slate-500 text-sm py-2">目前帳目已平衡</div>}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showMemberSettings && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-700">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50"><h3 className="font-bold text-lg text-slate-100 flex items-center gap-2"><Icons.Settings size={20} className="text-slate-400"/>成員資料</h3><button onClick={() => setShowMemberSettings(false)} className="p-1 text-slate-500 hover:bg-slate-700 rounded-full"><Icons.X size={20} /></button></div>
                                <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                                    {members.map(m => (<div key={m.id} className="flex items-center gap-3 p-3 border border-slate-700 rounded-xl bg-slate-900/50"><label className={`relative w-12 h-12 shrink-0 rounded-xl flex items-center justify-center text-white text-lg shadow-inner overflow-hidden cursor-pointer group ${m.avatar?.startsWith('data:image') ? 'bg-slate-800' : m.color}`} title="點擊更換頭像">{m.avatar?.startsWith('data:image') ? <img src={m.avatar} className="w-full h-full object-cover" /> : m.avatar}<div className="absolute inset-0 bg-black/60 hidden group-hover:flex items-center justify-center transition-colors"><Icons.Camera size={16} /></div><input type="file" accept="image/*" className="hidden" onChange={(e) => handleMemberAvatarUpload(m.id, e)} /></label><input type="text" value={m.name} onChange={(e) => updateMember(m.id, 'name', e.target.value)} className="flex-1 min-w-0 px-3 py-2.5 rounded-lg text-slate-200 outline-none border border-slate-700 bg-slate-800 focus:ring-2 focus:ring-blue-500" /><button onClick={() => handleDeleteMember(m.id)} className="p-2 shrink-0 text-slate-600 hover:text-red-400 transition-colors"><Icons.Trash2 size={18} /></button></div>))}
                                    <button onClick={handleAddMember} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold flex items-center justify-center gap-2"><Icons.Plus size={16} /> 新增成員</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDeleteDayConfirm && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此日？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShowDeleteDayConfirm(false)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300 transition-colors">取消</button><button onClick={() => { pushUpdate({trip:{...trip, days: trip.days.filter(d => d.id !== activeDayId)}}); if(trip.days.length > 1) setActiveDayId(trip.days.find(d=>d.id!==activeDayId).id); setShowDeleteDayConfirm(false); }} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-lg">刪除</button></div></div>
                        </div>
                    )}

                    {placeToDelete && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此景點？</h3><div className="flex gap-3 mt-6"><button onClick={() => setPlaceToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300 transition-colors">取消</button><button onClick={confirmDeletePlace} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-lg">刪除</button></div></div>
                        </div>
                    )}

                    {expenseToDelete && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此筆消費嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setExpenseToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300 transition-colors">取消</button><button onClick={confirmDeleteExpense} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-lg">刪除</button></div></div>
                        </div>
                    )}

                    {shoppingToDelete && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md">
                            <div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此待買項目嗎？</h3><div className="flex gap-3 mt-6"><button onClick={() => setShoppingToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300 transition-colors">取消</button><button onClick={confirmDeleteShopping} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-lg">刪除</button></div></div>
                        </div>
                    )}
                </div>
            );
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeTripId, setActiveTripId] = useState(null);
            const [trips, setTrips] = useState([]);
            const [toast, setToast] = useState(null);
            const [tripToDelete, setTripToDelete] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-trip-v1';
            const { db, auth } = getFirebaseContext();
            
            const showMsg = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            
            useEffect(() => { 
                const initAuth = async () => { 
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await window.FirebaseSDK.signInWithCustomToken(auth, __initial_auth_token); } 
                        catch (e) { console.warn("Token 過期"); try { await window.FirebaseSDK.signInAnonymously(auth); } catch (err) {} }
                    } else { try { await window.FirebaseSDK.signInAnonymously(auth); } catch (e) {} }
                }; 
                initAuth(); return window.FirebaseSDK.onAuthStateChanged(auth, setUser); 
            }, [auth]);
            
            useEffect(() => { 
                if (!user) return; 
                const tripsCollection = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'trips'); 
                return window.FirebaseSDK.onSnapshot(tripsCollection, (snapshot) => { 
                    const fetchedTrips = []; snapshot.forEach(doc => { fetchedTrips.push({ id: doc.id, ...doc.data() }); }); setTrips(fetchedTrips.sort((a, b) => b.id.localeCompare(a.id))); 
                }, (error) => { console.error("Firestore error:", error); }); 
            }, [user, db, appId]);

            const handleExportTrip = (tripData) => { 
                const dataStr = JSON.stringify(tripData, null, 2); const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob); 
                const link = document.createElement("a"); link.href = url; link.download = `${tripData.trip?.title || 'trip'}.json`; link.click(); URL.revokeObjectURL(url); showMsg("導出成功"); 
            };

            const handleImportTrip = (e) => { 
                const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); 
                reader.onload = async (event) => { 
                    try { 
                        const importedData = JSON.parse(event.target.result); if (!importedData.trip) return showMsg("格式錯誤"); 
                        const newTripId = 'trip_imp_' + Date.now(); importedData.id = newTripId; if (importedData.trip) importedData.trip.id = newTripId; 
                        await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', newTripId), importedData); showMsg("匯入成功！"); 
                    } catch (err) { showMsg("無效檔案"); } e.target.value = ''; 
                }; reader.readAsText(file); 
            };

            const confirmDeleteTrip = async () => { if (tripToDelete) { await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripToDelete)); setTripToDelete(null); showMsg("已刪除行程"); } };
            
            if (!user) return <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-blue-400 font-bold">同步連線中...</div>;
            
            return (
                <>
                    {currentView === 'dashboard' ? (
                        <Dashboard 
                            trips={trips} 
                            onCreateTrip={async () => { 
                                const nid = 'trip_' + Date.now(); 
                                await window.FirebaseSDK.setDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'trips', nid), { 
                                    trip: { id: nid, title: '新行程', dates: getFutureDate(0), icon: '🚀', days: [{id: 1, title: 'Day 1', date: getFutureDate(0), places: [], weather: { type: 'sun', minTemp: 20, maxTemp: 25, label: '晴天' }}] }, 
                                    members: [{ id: 'm1', name: '我', color: 'bg-blue-500', avatar: '👤' }], expenses: [], shoppingItems: [], packingList: [] 
                                }); setActiveTripId(nid); setCurrentView('planner'); 
                            }} 
                            onSelectTrip={(id) => { setActiveTripId(id); setCurrentView('planner'); }} onDeleteTrip={(id) => setTripToDelete(id)} onImportTrip={handleImportTrip} onExportTrip={handleExportTrip} toast={toast} 
                        />
                    ) : (<TripPlanner tripId={activeTripId} onBack={() => setCurrentView('dashboard')} db={db} appId={appId} user={user} />)}
                    {tripToDelete && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in"><div className="bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center border border-slate-700"><h3 className="font-bold text-lg text-slate-100">確定刪除此行程嗎？</h3><p className="text-slate-400 text-sm mt-2">刪除後將無法復原。</p><div className="flex gap-3 mt-6"><button onClick={() => setTripToDelete(null)} className="flex-1 py-2 border rounded-xl border-slate-600 hover:bg-slate-700 text-slate-300 transition-colors">取消</button><button onClick={confirmDeleteTrip} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded-xl transition-colors shadow-lg">刪除</button></div></div></div>
                    )}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
